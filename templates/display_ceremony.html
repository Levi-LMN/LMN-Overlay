<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceremony Overlay - Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Company Logo - Bottom right for ceremony */
        #company-logo-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: none;
        }

        #company-logo-container.visible {
            display: block;
        }

        #company-logo {
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
            transition: all 0.3s ease;
        }

        /* Main Overlay Container */
        #overlay-container {
            position: absolute;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #overlay-container.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        #overlay-container.cycle-hiding {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #overlay-container.ticker-active {
            margin-bottom: 50px;
        }

        /* Overlay inner wrapper - VERTICAL LAYOUT */
        #overlay-inner {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Category Image - absolutely positioned relative to overlay-inner */
        #category-image-container {
            position: absolute;
            display: none;
            z-index: 4;
        }

        #category-image-container.visible {
            display: block;
        }

        #category-image {
            display: block;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            padding: 0;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2), 0 3px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        /* Decorative line separators */
        .line-separator {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-color, #FFD700), transparent);
            margin: 10px 0;
            opacity: 0.5;
        }

        /* Decorative corner badges */
        .corner-badge {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--accent-color, #FFD700);
            opacity: 0.2;
            clip-path: polygon(0 0, 100% 0, 0 100%);
        }

        .badge-top-left {
            top: 0;
            left: 0;
        }

        .badge-top-right {
            top: 0;
            right: 0;
            transform: rotate(90deg);
        }

        .badge-bottom-left {
            bottom: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .badge-bottom-right {
            bottom: 0;
            right: 0;
            transform: rotate(180deg);
        }

        /* Text Content Section - BELOW IMAGE */
        #text-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 0 30px;
        }

        #main-text,
        #secondary-text,
        #company-name {
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: all 0.4s ease;
            width: 100%;
        }

        #main-text {
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        #secondary-text-container {
            position: relative;
            display: block;
            width: 100%;
        }

        #secondary-text {
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0.5px;
            opacity: 0.95;
            display: block;
        }

        #company-name {
            font-weight: 500;
            opacity: 0.85;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ticker Container */
        #ticker-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            z-index: 50;
            display: none;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
        }

        #ticker-container.visible {
            display: block;
        }

        #ticker-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        #ticker-content {
            display: inline-block;
            white-space: nowrap;
            padding: 14px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
            will-change: transform;
        }

        /* Entrance Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(100px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-100px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes rotateIn {
            from { opacity: 0; transform: rotate(-180deg) scale(0.5); }
            to { opacity: 1; transform: rotate(0deg) scale(1); }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes flipIn {
            from { opacity: 0; transform: perspective(400px) rotateY(90deg); }
            to { opacity: 1; transform: perspective(400px) rotateY(0deg); }
        }

        .anim-fadeIn, .anim-fade-in { animation-name: fadeIn; animation-fill-mode: both; }
        .anim-slideInLeft, .anim-slide-in-left, .anim-slide-left { animation-name: slideInLeft; animation-fill-mode: both; }
        .anim-slideInRight, .anim-slide-in-right, .anim-slide-right { animation-name: slideInRight; animation-fill-mode: both; }
        .anim-slideInUp, .anim-slide-in-up, .anim-slide-up { animation-name: slideInUp; animation-fill-mode: both; }
        .anim-slideInDown, .anim-slide-in-down, .anim-slide-down { animation-name: slideInDown; animation-fill-mode: both; }
        .anim-zoomIn, .anim-zoom-in { animation-name: zoomIn; animation-fill-mode: both; }
        .anim-scaleIn, .anim-scale-in { animation-name: scaleIn; animation-fill-mode: both; }
        .anim-rotateIn, .anim-rotate-in { animation-name: rotateIn; animation-fill-mode: both; }
        .anim-bounceIn, .anim-bounce-in { animation-name: bounceIn; animation-fill-mode: both; }
        .anim-flipIn, .anim-flip-in { animation-name: flipIn; animation-fill-mode: both; }

        /* Display Animations */
        @keyframes displayPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes displayBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes displayShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes displayFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes displayGlow {
            0%, 100% { filter: brightness(1) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3)); }
            50% { filter: brightness(1.3) drop-shadow(0 4px 20px rgba(255, 215, 0, 0.6)); }
        }

        @keyframes displayRotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes displayFlip {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        @keyframes displayZoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes displayPan {
            0%, 100% { transform: translateX(0) scale(1.05); }
            50% { transform: translateX(-5%) scale(1.05); }
        }

        @keyframes displayTilt {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes displaySwing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .display-pulse { animation: displayPulse 2s ease-in-out infinite; }
        .display-bounce { animation: displayBounce 2s ease-in-out infinite; }
        .display-shake { animation: displayShake 2s ease-in-out infinite; }
        .display-float { animation: displayFloat 3s ease-in-out infinite; }
        .display-glow { animation: displayGlow 3s ease-in-out infinite; }
        .display-rotate-slow { animation: displayRotate 10s linear infinite; }
        .display-flip { animation: displayFlip 4s ease-in-out infinite; }
        .display-flip-slow { animation: displayRotate 12s linear infinite; }
        .display-zoom-slow { animation: displayZoom 8s ease-in-out infinite; }
        .display-pan { animation: displayPan 10s ease-in-out infinite; }
        .display-tilt { animation: displayTilt 3s ease-in-out infinite; }
        .display-swing { animation: displaySwing 2s ease-in-out infinite; }

        /* Text Animations */
        @keyframes textPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2); }
            50% { text-shadow: 0 0 25px currentColor, 0 2px 10px rgba(0, 0, 0, 0.2); }
        }

        @keyframes textFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes textBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes textShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        @keyframes textZoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .text-pulse { animation: textPulse 2s ease-in-out infinite; }
        .text-glow { animation: textGlow 2s ease-in-out infinite; }
        .text-float { animation: textFloat 3s ease-in-out infinite; }
        .text-bounce { animation: textBounce 2s ease-in-out infinite; }
        .text-shake { animation: textShake 2s ease-in-out infinite; }
        .text-zoom { animation: textZoom 2s ease-in-out infinite; }

        /* Typewriter cursor */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: currentColor;
            margin-left: 2px;
            animation: blink 1s step-start infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }


        /* ═══════════════════════════════════════════════════════════════
           NEW CONTINUOUS TEXT ANIMATIONS
        ═══════════════════════════════════════════════════════════════ */

        /* Wave – requires JS to wrap each letter in .wave-letter span */
        @keyframes letterWave {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }
        .wave-letter { display: inline-block; animation: letterWave 1s ease-in-out infinite; }

        /* Shimmer – brightness sweep */
        @keyframes textShimmer {
            0%,80%,100% { text-shadow: none; filter: brightness(1); }
            20%  { text-shadow: -12px 0 14px rgba(255,255,255,0.6); filter: brightness(1.3); }
            40%  { text-shadow: 0 0 20px rgba(255,255,255,0.85); filter: brightness(1.6); }
            60%  { text-shadow: 12px 0 14px rgba(255,255,255,0.6); filter: brightness(1.3); }
        }
        .text-shimmer { animation: textShimmer 2.5s ease-in-out infinite; }

        /* Neon Flicker */
        @keyframes neonFlicker {
            0%,18%,22%,25%,53%,57%,100% {
                text-shadow: 0 0 5px #fff, 0 0 12px currentColor, 0 0 25px currentColor, 0 0 45px currentColor;
                opacity: 1;
            }
            20%,24%,55% { text-shadow: none; opacity: 0.4; }
        }
        .text-neon-flicker { animation: neonFlicker 3.5s linear infinite; }

        /* Glitch */
        @keyframes textGlitch {
            0%,6%,48%,54%,100% { transform: translate(0); text-shadow: none; }
            2%  { transform: translate(-3px, 1px);  text-shadow: -3px 0 0 rgba(255,0,0,.7), 3px 0 0 rgba(0,255,255,.7); }
            4%  { transform: translate(3px, -1px);  text-shadow: 3px 0 0 rgba(255,0,0,.7), -3px 0 0 rgba(0,255,255,.7); }
            50% { transform: translate(2px, 2px);   text-shadow: -2px 0 0 rgba(255,0,0,.5); }
            52% { transform: translate(-2px, -2px); text-shadow: 2px 0 0 rgba(0,255,255,.5); }
        }
        .text-glitch { animation: textGlitch 4s steps(1) infinite; }

        /* Gradient sweep (hue shift) */
        @keyframes gradientSweepAnim {
            0%,100% { filter: hue-rotate(0deg) brightness(1); }
            25%     { filter: hue-rotate(30deg) brightness(1.1); }
            50%     { filter: hue-rotate(60deg) brightness(1.2); }
            75%     { filter: hue-rotate(30deg) brightness(1.1); }
        }
        .text-gradient-sweep { animation: gradientSweepAnim 4s ease-in-out infinite; }

        /* Color cycle */
        @keyframes colorCycleAnim { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
        .text-color-cycle { animation: colorCycleAnim 5s linear infinite; }

        /* Blur pulse */
        @keyframes blurPulseAnim {
            0%,100% { filter: blur(0px) brightness(1); }
            50%     { filter: blur(2.5px) brightness(1.2); }
        }
        .text-blur-pulse { animation: blurPulseAnim 2.5s ease-in-out infinite; }

        /* ═══════════════════════════════════════════════════════════════
           OVERLAY CONTAINER ENTRY / EXIT KEYFRAMES
        ═══════════════════════════════════════════════════════════════ */

        @keyframes overlayFadeIn    { from { opacity:0; } to { opacity:1; } }
        @keyframes overlayFadeOut   { from { opacity:1; } to { opacity:0; } }

        @keyframes overlayWipeInLeft   { from { clip-path:inset(0 100% 0 0); } to { clip-path:inset(0 0 0 0); } }
        @keyframes overlayWipeOutLeft  { from { clip-path:inset(0 0 0 0); }   to { clip-path:inset(0 0 0 100%); } }
        @keyframes overlayWipeInRight  { from { clip-path:inset(0 0 0 100%); } to { clip-path:inset(0 0 0 0); } }
        @keyframes overlayWipeOutRight { from { clip-path:inset(0 0 0 0); }    to { clip-path:inset(0 100% 0 0); } }
        @keyframes overlayWipeInUp     { from { clip-path:inset(100% 0 0 0); } to { clip-path:inset(0 0 0 0); } }
        @keyframes overlayWipeOutUp    { from { clip-path:inset(0 0 0 0); }    to { clip-path:inset(0 0 100% 0); } }
        @keyframes overlayWipeInDown   { from { clip-path:inset(0 0 100% 0); } to { clip-path:inset(0 0 0 0); } }
        @keyframes overlayWipeOutDown  { from { clip-path:inset(0 0 0 0); }    to { clip-path:inset(100% 0 0 0); } }

        @keyframes overlaySlideInLeft   { from { opacity:0; transform:translateX(-110%); } to { opacity:1; transform:translateX(0); } }
        @keyframes overlaySlideOutLeft  { from { opacity:1; transform:translateX(0); }    to { opacity:0; transform:translateX(-110%); } }
        @keyframes overlaySlideInRight  { from { opacity:0; transform:translateX(110%); } to { opacity:1; transform:translateX(0); } }
        @keyframes overlaySlideOutRight { from { opacity:1; transform:translateX(0); }    to { opacity:0; transform:translateX(110%); } }
        @keyframes overlaySlideInUp     { from { opacity:0; transform:translateY(80px); } to { opacity:1; transform:translateY(0); } }
        @keyframes overlaySlideOutUp    { from { opacity:1; transform:translateY(0); }    to { opacity:0; transform:translateY(-80px); } }
        @keyframes overlaySlideInDown   { from { opacity:0; transform:translateY(-80px); } to { opacity:1; transform:translateY(0); } }
        @keyframes overlaySlideOutDown  { from { opacity:1; transform:translateY(0); }     to { opacity:0; transform:translateY(80px); } }

        @keyframes overlaySplitInH  { from { clip-path:polygon(0 50%,100% 50%,100% 50%,0 50%); } to { clip-path:polygon(0 0,100% 0,100% 100%,0 100%); } }
        @keyframes overlaySplitOutH { from { clip-path:polygon(0 0,100% 0,100% 100%,0 100%); }   to { clip-path:polygon(0 50%,100% 50%,100% 50%,0 50%); } }
        @keyframes overlaySplitInV  { from { clip-path:polygon(50% 0,50% 0,50% 100%,50% 100%); } to { clip-path:polygon(0 0,100% 0,100% 100%,0 100%); } }
        @keyframes overlaySplitOutV { from { clip-path:polygon(0 0,100% 0,100% 100%,0 100%); }   to { clip-path:polygon(50% 0,50% 0,50% 100%,50% 100%); } }

        @keyframes overlayIrisIn    { from { clip-path:circle(0% at 50% 50%); }   to { clip-path:circle(150% at 50% 50%); } }
        @keyframes overlayIrisOut   { from { clip-path:circle(150% at 50% 50%); } to { clip-path:circle(0% at 50% 50%); } }

        @keyframes overlayZoomCornerIn  { from { opacity:0; transform:scale(0.05); } to { opacity:1; transform:scale(1); } }
        @keyframes overlayZoomCornerOut { from { opacity:1; transform:scale(1); }    to { opacity:0; transform:scale(0.05); } }
        .overlay-zoom-corner { transform-origin: 0% 100%; }

        @keyframes venetianIn  {
            0%   { clip-path:inset(0 0 95% 0); }
            20%  { clip-path:inset(0 0 75% 0); }
            40%  { clip-path:inset(0 0 55% 0); }
            60%  { clip-path:inset(0 0 35% 0); }
            80%  { clip-path:inset(0 0 15% 0); }
            100% { clip-path:inset(0 0  0% 0); }
        }
        @keyframes venetianOut {
            0%   { clip-path:inset(0 0  0% 0); }
            100% { clip-path:inset(0 0 100% 0); }
        }

        /* ═══════════════════════════════════════════════════════════════
           STAGGER ELEMENT ENTRY / EXIT KEYFRAMES
        ═══════════════════════════════════════════════════════════════ */

        @keyframes elFadeOut      { to   { opacity:0; } }
        @keyframes elFadeIn       { from { opacity:0; }                             to { opacity:1; } }
        @keyframes elSlideOutLeft { to   { opacity:0; transform:translateX(-60px); } }
        @keyframes elSlideInLeft  { from { opacity:0; transform:translateX(-60px); } to { opacity:1; transform:translateX(0); } }
        @keyframes elSlideOutRight{ to   { opacity:0; transform:translateX(60px);  } }
        @keyframes elSlideInRight { from { opacity:0; transform:translateX(60px);  } to { opacity:1; transform:translateX(0); } }
        @keyframes elSlideOutUp   { to   { opacity:0; transform:translateY(-30px); } }
        @keyframes elSlideInUp    { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes elSlideOutDown { to   { opacity:0; transform:translateY(30px);  } }
        @keyframes elSlideInDown  { from { opacity:0; transform:translateY(30px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes elShrinkOut    { to   { opacity:0; transform:scale(0) rotate(6deg);  } }
        @keyframes elGrowIn       { from { opacity:0; transform:scale(0) rotate(-6deg); } to { opacity:1; transform:scale(1) rotate(0); } }
        @keyframes elBlurOut      { to   { opacity:0; filter:blur(14px); } }
        @keyframes elBlurIn       { from { opacity:0; filter:blur(14px); }          to { opacity:1; filter:blur(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            #category-image {
                width: 80px !important;
                height: 80px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Company Logo -->
    <div id="company-logo-container">
        <img id="company-logo" src="" alt="Company Logo">
    </div>

    <!-- Main Overlay Container -->
    <div id="overlay-container">
        <div id="overlay-inner">
            <!-- Decorative Corner Badges -->
            <div class="corner-badge badge-top-left"></div>
            <div class="corner-badge badge-top-right"></div>
            <div class="corner-badge badge-bottom-left"></div>
            <div class="corner-badge badge-bottom-right"></div>

            <!-- Category Image (TOP CENTER) -->
            <div id="category-image-container">
                <img id="category-image" src="" alt="Category Image">
            </div>

            <!-- Decorative Line -->
            <div class="line-separator"></div>

            <!-- Text Content (BELOW IMAGE) -->
            <div id="text-content">
                <div id="main-text"></div>
                <div id="secondary-text-container">
                    <div id="secondary-text"></div>
                </div>
                <div id="company-name"></div>
            </div>

            <!-- Decorative Line -->
            <div class="line-separator"></div>
        </div>
    </div>

    <!-- Ticker Container -->
    <div id="ticker-container">
        <div id="ticker-wrapper">
            <div id="ticker-content"></div>
        </div>
    </div>

    <script>
        const category = new URLSearchParams(window.location.search).get('category') || 'ceremony';

        const overlayContainer = document.getElementById('overlay-container');
        const overlayInner = document.getElementById('overlay-inner');
        const mainText = document.getElementById('main-text');
        const secondaryTextContainer = document.getElementById('secondary-text-container');
        const secondaryText = document.getElementById('secondary-text');
        const companyName = document.getElementById('company-name');
        const categoryImageContainer = document.getElementById('category-image-container');
        const categoryImage = document.getElementById('category-image');
        const companyLogoContainer = document.getElementById('company-logo-container');
        const companyLogo = document.getElementById('company-logo');
        const tickerContainer = document.getElementById('ticker-container');
        const tickerContent = document.getElementById('ticker-content');
        const lineSeparators = document.querySelectorAll('.line-separator');
        const cornerBadges = document.querySelectorAll('.corner-badge');

        let currentSettings = {};
        let secondaryPhrases = [];
        let phraseIndex = 0;
        let rotationInterval = null;
        let tickerAnimation = null;
        let textAnimationTimeout = null;
        let textAnimRepeatTimer = null;
        let overlayCycleTimer = null;
        let overlayCycleState = 'visible';

        let typewriterIntervals = { main: null, secondary: null, company: null };

        function calculateSecondaryTextDimensions(phrases, fontSize, fontFamily, lineHeight, containerMaxWidth, hasBg, bgPadding) {
            if (!phrases || phrases.length === 0) return { width: 0, height: 0 };

            const temp = document.createElement('div');
            temp.style.position = 'absolute';
            temp.style.visibility = 'hidden';
            temp.style.fontSize = fontSize + 'px';
            temp.style.fontFamily = fontFamily;
            temp.style.fontWeight = '400';
            temp.style.letterSpacing = '0.5px';
            temp.style.lineHeight = lineHeight;
            temp.style.wordWrap = 'break-word';
            temp.style.overflowWrap = 'break-word';
            temp.style.maxWidth = containerMaxWidth + 'px';
            temp.style.textAlign = 'center';

            if (hasBg && bgPadding) {
                temp.style.padding = bgPadding;
                temp.style.borderRadius = '6px';
                temp.style.display = 'inline-block';
            }

            document.body.appendChild(temp);

            let maxWidth = 0;
            let maxHeight = 0;

            phrases.forEach(phrase => {
                temp.textContent = phrase;
                const rect = temp.getBoundingClientRect();
                if (rect.width > maxWidth) maxWidth = rect.width;
                if (rect.height > maxHeight) maxHeight = rect.height;
            });

            document.body.removeChild(temp);
            return { width: Math.ceil(maxWidth), height: Math.ceil(maxHeight) };
        }

        async function updateDisplay() {
            try {
                const response = await fetch(`/api/poll/${category}`);
                const data = await response.json();

                if (data.settings) {
                    const newSettings = data.settings;
                    if (JSON.stringify(newSettings) !== JSON.stringify(currentSettings)) {
                        currentSettings = newSettings;
                        secondaryPhrases = newSettings.secondary_phrases || [];
                        applySettings();
                    }
                }
            } catch (error) {
                console.error('Error fetching settings:', error);
            }
        }

        function applySettings() {
            const s = currentSettings;

            if (s.is_visible) {
                if (s.overlay_cycle_enabled) {
                    startOverlayCycle();
                } else {
                    stopOverlayCycle();
                    overlayContainer.classList.add('visible');
                }
            } else {
                stopOverlayCycle();
                overlayContainer.classList.remove('visible');
            }

            applyPositioning();
            applyStyling();
            applyTextContent();
            applyDecorations();
            applyAnimations();

            if (s.secondary_rotation_enabled && secondaryPhrases.length > 0) {
                startSecondaryRotation();
            } else {
                stopSecondaryRotation();
            }

            if (s.show_category_image && s.category_image) {
                categoryImage.src = `/static/${s.category_image}`;
                categoryImageContainer.classList.add('visible');
            } else {
                categoryImageContainer.classList.remove('visible');
            }

            if (s.show_company_logo && s.company_logo) {
                companyLogo.src = `/static/${s.company_logo}`;
                companyLogoContainer.classList.add('visible');
            } else {
                companyLogoContainer.classList.remove('visible');
            }

            if (s.show_ticker && s.ticker_text) {
                tickerContent.textContent = s.ticker_text;
                tickerContainer.classList.add('visible');
                overlayContainer.classList.add('ticker-active');
                startTicker();
            } else {
                tickerContainer.classList.remove('visible');
                overlayContainer.classList.remove('ticker-active');
                stopTicker();
            }
        }

        function applyPositioning() {
            const s = currentSettings;

            switch (s.vertical_position) {
                case 'top':
                    overlayContainer.style.top = '20px';
                    overlayContainer.style.bottom = 'auto';
                    overlayContainer.style.transform = 'none';
                    break;
                case 'middle':
                    overlayContainer.style.top = '50%';
                    overlayContainer.style.transform = 'translateY(-50%)';
                    overlayContainer.style.bottom = 'auto';
                    break;
                case 'bottom':
                    overlayContainer.style.bottom = '20px';
                    overlayContainer.style.top = 'auto';
                    overlayContainer.style.transform = 'none';
                    break;
                case 'custom':
                    if (s.custom_top !== null && s.custom_top !== undefined) {
                        overlayContainer.style.top = s.custom_top + 'px';
                        overlayContainer.style.bottom = 'auto';
                        overlayContainer.style.transform = 'none';
                    } else if (s.custom_bottom !== null && s.custom_bottom !== undefined) {
                        overlayContainer.style.bottom = s.custom_bottom + 'px';
                        overlayContainer.style.top = 'auto';
                        overlayContainer.style.transform = 'none';
                    }
                    break;
            }

            switch (s.horizontal_position) {
                case 'left':
                    overlayContainer.style.left = '20px';
                    overlayContainer.style.right = 'auto';
                    if (s.vertical_position !== 'middle') {
                        overlayContainer.style.transform = 'none';
                    }
                    break;
                case 'center':
                    overlayContainer.style.left = '50%';
                    if (s.vertical_position === 'middle') {
                        overlayContainer.style.transform = 'translate(-50%, -50%)';
                    } else {
                        overlayContainer.style.transform = 'translateX(-50%)';
                    }
                    overlayContainer.style.right = 'auto';
                    break;
                case 'right':
                    overlayContainer.style.right = '20px';
                    overlayContainer.style.left = 'auto';
                    if (s.vertical_position !== 'middle') {
                        overlayContainer.style.transform = 'none';
                    }
                    break;
                case 'custom':
                    if (s.custom_left !== null && s.custom_left !== undefined) {
                        overlayContainer.style.left = s.custom_left + 'px';
                        overlayContainer.style.right = 'auto';
                    } else if (s.custom_right !== null && s.custom_right !== undefined) {
                        overlayContainer.style.right = s.custom_right + 'px';
                        overlayContainer.style.left = 'auto';
                    }
                    if (s.vertical_position !== 'middle') {
                        overlayContainer.style.transform = 'none';
                    }
                    break;
            }

            if (s.container_width === 'full') {
                overlayContainer.style.width = '100%';
            } else if (s.container_width === 'custom' && s.custom_width) {
                overlayContainer.style.width = s.custom_width + 'px';
            } else {
                overlayContainer.style.width = 'auto';
                overlayContainer.style.maxWidth = (s.container_max_width || 900) + 'px';
                overlayContainer.style.minWidth = (s.container_min_width || 400) + 'px';
            }

            if (s.container_height === 'custom' && s.custom_height) {
                overlayContainer.style.height = s.custom_height + 'px';
            } else {
                overlayContainer.style.height = 'auto';
            }

            const containerPadding = s.container_padding || 25;
            overlayInner.style.padding = containerPadding + 'px';

            // --- Dynamic image container positioning (unified approach) ---
            const imageSize = s.image_size || 120;
            const imagePos = s.image_position || 'top';
            const halfSize = Math.round(imageSize / 2);
            const gap = 16;

            // FULL RESET on every call — prevents stale styles from previous position
            categoryImageContainer.style.position = 'absolute';
            categoryImageContainer.style.left   = 'auto';
            categoryImageContainer.style.right  = 'auto';
            categoryImageContainer.style.top    = 'auto';
            categoryImageContainer.style.bottom = 'auto';
            categoryImageContainer.style.transform = 'none';
            overlayInner.style.flexDirection = 'column'; // ceremony default is column

            // Reset text-content padding to base, override per-mode below
            const textContentDiv = document.getElementById('text-content');
            textContentDiv.style.paddingTop    = containerPadding + 'px';
            textContentDiv.style.paddingBottom = containerPadding + 'px';
            textContentDiv.style.paddingLeft   = containerPadding + 'px';
            textContentDiv.style.paddingRight  = containerPadding + 'px';

            if (imagePos === 'left') {
                categoryImageContainer.style.left      = -halfSize + 'px';
                categoryImageContainer.style.top       = '50%';
                categoryImageContainer.style.transform = 'translateY(-50%)';
                overlayInner.style.flexDirection = 'row';
                textContentDiv.style.paddingLeft = (halfSize + gap) + 'px';
            } else if (imagePos === 'right') {
                categoryImageContainer.style.right     = -halfSize + 'px';
                categoryImageContainer.style.top       = '50%';
                categoryImageContainer.style.transform = 'translateY(-50%)';
                overlayInner.style.flexDirection = 'row';
                textContentDiv.style.paddingRight = (halfSize + gap) + 'px';
            } else if (imagePos === 'top') {
                categoryImageContainer.style.top       = -halfSize + 'px';
                categoryImageContainer.style.left      = '50%';
                categoryImageContainer.style.transform = 'translateX(-50%)';
                textContentDiv.style.paddingTop = (halfSize + gap) + 'px';
            } else if (imagePos === 'bottom') {
                categoryImageContainer.style.bottom    = -halfSize + 'px';
                categoryImageContainer.style.left      = '50%';
                categoryImageContainer.style.transform = 'translateX(-50%)';
                textContentDiv.style.paddingBottom = (halfSize + gap) + 'px';
            } else if (imagePos === 'top-left') {
                categoryImageContainer.style.top  = -halfSize + 'px';
                categoryImageContainer.style.left = -halfSize + 'px';
                textContentDiv.style.paddingTop  = (halfSize + gap) + 'px';
                textContentDiv.style.paddingLeft = (halfSize + gap) + 'px';
            } else if (imagePos === 'top-right') {
                categoryImageContainer.style.top   = -halfSize + 'px';
                categoryImageContainer.style.right = -halfSize + 'px';
                textContentDiv.style.paddingTop   = (halfSize + gap) + 'px';
                textContentDiv.style.paddingRight = (halfSize + gap) + 'px';
            }

            if (s.logo_size) {
                companyLogo.style.width = s.logo_size + 'px';
                companyLogo.style.height = 'auto';
            }

            companyLogo.style.opacity = s.logo_opacity || 1;
            companyLogo.style.borderRadius = (s.logo_border_radius || 0) + 'px';

            if (s.logo_shadow) {
                companyLogo.style.filter = 'drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3))';
            } else {
                companyLogo.style.filter = 'none';
            }
        }

        function applyStyling() {
            const s = currentSettings;

            overlayContainer.style.backgroundColor = hexToRgba(
                s.overlay_bg_color || '#1a237e',
                s.overlay_bg_opacity || 0.9
            );
            overlayContainer.style.borderRadius = (s.border_radius || 15) + 'px';
            overlayContainer.style.opacity = s.opacity !== undefined ? s.opacity : 0.9;

            if (s.border_width && s.border_width > 0) {
                overlayContainer.style.border = `${s.border_width}px solid ${s.border_color || '#FFD700'}`;
            } else {
                overlayContainer.style.border = 'none';
            }

            const imageBorderColor1 = s.accent_color || '#FFD700';
            const imageBorderColor2 = s.border_color || '#FFA500';
            document.documentElement.style.setProperty('--image-border-color-1', imageBorderColor1);
            document.documentElement.style.setProperty('--image-border-color-2', imageBorderColor2);
            document.documentElement.style.setProperty('--accent-color', s.accent_color || '#FFD700');

            mainText.style.fontSize = (s.main_font_size || 48) + 'px';
            mainText.style.color = s.main_text_color || '#FFFFFF';
            mainText.style.fontFamily = s.main_font_family || s.font_family || 'Segoe UI, sans-serif';
            mainText.style.lineHeight = s.text_line_height || 1.2;

            if (s.main_text_bg_color && s.main_text_bg_color !== 'transparent' && s.main_text_bg_opacity > 0) {
                mainText.style.backgroundColor = hexToRgba(s.main_text_bg_color, s.main_text_bg_opacity || 0);
                mainText.style.padding = '10px 15px';
                mainText.style.borderRadius = '8px';
                mainText.style.display = 'inline-block';
            } else {
                mainText.style.backgroundColor = 'transparent';
                mainText.style.padding = '0';
                mainText.style.display = 'block';
            }

            const secondaryFontSize = s.secondary_font_size || 28;
            const secondaryFontFamily = s.secondary_font_family || s.font_family || 'Segoe UI, sans-serif';
            const secondaryLineHeight = s.text_line_height || 1.4;

            secondaryText.style.fontSize = secondaryFontSize + 'px';
            secondaryText.style.color = s.secondary_text_color || '#FFD700';
            secondaryText.style.fontFamily = secondaryFontFamily;
            secondaryText.style.lineHeight = secondaryLineHeight;

            const hasSecondaryBg = s.secondary_text_bg_color && s.secondary_text_bg_color !== 'transparent' && (s.secondary_text_bg_opacity || 0) > 0;
            const secondaryBgPadding = hasSecondaryBg ? '8px 12px' : '0';

            if (s.secondary_rotation_enabled && secondaryPhrases.length > 0) {
                const containerMaxWidth = (s.container_max_width || 900) - (s.container_padding || 25) * 2;

                const dims = calculateSecondaryTextDimensions(
                    secondaryPhrases,
                    secondaryFontSize,
                    secondaryFontFamily,
                    secondaryLineHeight,
                    containerMaxWidth,
                    hasSecondaryBg,
                    secondaryBgPadding
                );

                if (dims.width > 0 && dims.height > 0) {
                    secondaryTextContainer.style.minWidth = dims.width + 'px';
                    secondaryTextContainer.style.minHeight = dims.height + 'px';
                }
            } else {
                secondaryTextContainer.style.minWidth = 'auto';
                secondaryTextContainer.style.minHeight = 'auto';
            }

            if (hasSecondaryBg) {
                secondaryText.style.backgroundColor = hexToRgba(s.secondary_text_bg_color, s.secondary_text_bg_opacity || 0);
                secondaryText.style.padding = '8px 12px';
                secondaryText.style.borderRadius = '6px';
                secondaryText.style.display = 'inline-block';
            } else {
                secondaryText.style.backgroundColor = 'transparent';
                secondaryText.style.padding = '0';
                secondaryText.style.display = 'block';
            }

            companyName.style.fontSize = (s.company_name_font_size || 20) + 'px';
            companyName.style.color = s.company_name_color || '#FFD700';
            companyName.style.fontFamily = s.company_name_font_family || s.font_family || 'Segoe UI, sans-serif';
            companyName.style.fontStyle = (s.company_name_italic !== false) ? 'italic' : 'normal';

            if (s.company_name_bg_color && s.company_name_bg_color !== 'transparent' && (s.company_name_bg_opacity || 0) > 0) {
                companyName.style.backgroundColor = hexToRgba(s.company_name_bg_color, s.company_name_bg_opacity || 0);
                companyName.style.padding = '6px 10px';
                companyName.style.borderRadius = '5px';
                companyName.style.display = 'inline-block';
            } else {
                companyName.style.backgroundColor = 'transparent';
                companyName.style.padding = '0';
                companyName.style.display = 'block';
            }

            if (s.show_ticker) {
                tickerContent.style.fontSize = (s.ticker_font_size || 18) + 'px';
                tickerContent.style.color = s.ticker_text_color || '#FFFFFF';
                tickerContent.style.fontFamily = s.ticker_font_family || s.font_family || 'Segoe UI, sans-serif';
                tickerContainer.style.backgroundColor = hexToRgba(s.ticker_bg_color || '#0d47a1', s.ticker_bg_opacity || 0.8);
            }

            // --- Photo / Category Image container styling ---
            const imageSize = s.image_size || 120;
            const imageShape = s.image_shape || 'rounded';
            const imageBorderWidth = s.image_border_width !== undefined ? s.image_border_width : 2;
            const imageBorderColor = s.image_border_color || '#FFD700';
            const imageFit = s.image_fit || 'cover';

            categoryImage.style.width = imageSize + 'px';
            categoryImage.style.height = imageSize + 'px';
            categoryImage.style.objectFit = imageFit;
            categoryImage.style.border = `${imageBorderWidth}px solid ${imageBorderColor}`;
            categoryImage.style.background = 'none';
            categoryImage.style.padding = '0';
            categoryImage.style.boxShadow = '0 8px 25px rgba(0,0,0,0.3)';

            if (imageShape === 'circle') {
                categoryImage.style.borderRadius = '50%';
            } else if (imageShape === 'square') {
                categoryImage.style.borderRadius = '0';
            } else if (imageShape === 'rounded') {
                categoryImage.style.borderRadius = Math.round(imageSize * 0.12) + 'px';
            }
        }

        function applyTextContent() {
            const s = currentSettings;

            Object.keys(typewriterIntervals).forEach(key => {
                if (typewriterIntervals[key]) {
                    clearInterval(typewriterIntervals[key]);
                    typewriterIntervals[key] = null;
                }
            });

            const mainAnim = (s.main_text_animation      && s.main_text_animation      !== 'none') ? s.main_text_animation      : (s.text_animation || 'none');
            const secAnim  = (s.secondary_text_animation && s.secondary_text_animation !== 'none') ? s.secondary_text_animation : (s.text_animation || 'none');
            const compAnim = (s.company_name_animation   && s.company_name_animation   !== 'none') ? s.company_name_animation   : (s.text_animation || 'none');
            const spd      = s.text_animation_speed || 1.0;

            applyTextToElement(mainText,      s.main_text      || '', mainAnim,  spd, 'main');
            applyTextToElement(secondaryText, s.secondary_text || '', secAnim,   spd, 'secondary');
            applyTextToElement(companyName,   s.company_name   || '', compAnim,  spd, 'company');
        }

        function applyTextToElement(element, text, anim, speed, key) {
            element.className = element.className.split(' ').filter(c => !c.startsWith('text-') && c !== 'wave-letter').join(' ');
            element.style.animation = '';
            element.style.overflow  = '';

            if      (anim === 'typewriter')      applyTypewriterEffect(element, text, key, speed);
            else if (anim === 'fade-in-words')   applyFadeInWords(element, text, speed);
            else if (anim === 'slide-in-words')  applySlideInWords(element, text, speed);
            else if (anim === 'letter-cascade')  applyLetterCascade(element, text, speed);
            else if (anim === 'scramble')        applyScramble(element, text, speed);
            else if (anim === 'fade-in-letters') applyFadeInLetters(element, text, speed);
            else if (anim === 'roll-up')         applyRollUp(element, text, speed);
            else if (anim === 'split-reveal')    applySplitReveal(element, text, speed);
            else if (anim === 'wave')            applyWaveSetup(element, text, speed);
            else                                  element.textContent = text;
        }


        // ═══════════════════════════════════════════════════════════════════
        // ALL TEXT ANIMATION FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════

        function applyTypewriterEffect(element, text, key, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '<span class="typewriter-cursor"></span>';
            let index = 0;
            const baseDelay = 100 / speed;
            typewriterIntervals[key] = setInterval(() => {
                if (index < text.length) {
                    const cursor = element.querySelector('.typewriter-cursor');
                    const textNode = document.createTextNode(text.charAt(index));
                    element.insertBefore(textNode, cursor);
                    index++;
                } else {
                    clearInterval(typewriterIntervals[key]);
                    typewriterIntervals[key] = null;
                    setTimeout(() => { const c = element.querySelector('.typewriter-cursor'); if (c) c.remove(); }, 1000);
                }
            }, baseDelay);
        }

        function applyFadeInWords(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const baseDelay = 200 / speed;
            text.split(' ').forEach((word, i) => {
                const span = document.createElement('span');
                span.textContent = word;
                span.style.cssText = 'opacity:0;display:inline-block;margin-right:0.3em;transition:opacity 0.5s ease-in';
                element.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; }, i * baseDelay);
            });
        }

        function applySlideInWords(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const baseDelay = 200 / speed;
            text.split(' ').forEach((word, i) => {
                const span = document.createElement('span');
                span.textContent = word;
                span.style.cssText = 'opacity:0;transform:translateX(-20px);display:inline-block;margin-right:0.3em;transition:all 0.5s ease-out';
                element.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; span.style.transform = 'translateX(0)'; }, i * baseDelay);
            });
        }

        function applyLetterCascade(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const delay = 60 / speed;
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.cssText = `display:inline-block;opacity:0;transform:translateY(-24px);transition:opacity 0.3s ease,transform 0.35s cubic-bezier(0.34,1.56,0.64,1);transition-delay:${i * delay}ms`;
                element.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; span.style.transform = 'translateY(0)'; }, 50 + i * delay);
            });
        }

        function applyScramble(element, text, speed) {
            if (!text) { element.textContent = ''; return; }
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*?!';
            const revealDelay = Math.max(30, 70 / speed);
            const shuffleMs   = Math.max(20, 40 / speed);
            let revealed = 0;
            const rand = () => chars[Math.floor(Math.random() * chars.length)];
            const shuffleTimer = setInterval(() => {
                let out = '';
                for (let i = 0; i < text.length; i++) {
                    if (text[i] === ' ') { out += ' '; continue; }
                    out += i < revealed ? text[i] : rand();
                }
                element.textContent = out;
            }, shuffleMs);
            const revealTimer = setInterval(() => {
                revealed++;
                if (revealed >= text.length) {
                    clearInterval(revealTimer);
                    clearInterval(shuffleTimer);
                    element.textContent = text;
                }
            }, revealDelay);
        }

        function applyFadeInLetters(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const delay = 50 / speed;
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.cssText = 'display:inline-block;opacity:0;transition:opacity 0.4s ease';
                element.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; }, i * delay);
            });
        }

        function applyRollUp(element, text, speed) {
            if (!text) { element.textContent = ''; return; }
            const dur = Math.round(800 / speed);
            element.style.overflow = 'hidden';
            const inner = document.createElement('div');
            inner.textContent = text;
            inner.style.cssText = `transform:translateY(100%);transition:transform ${dur}ms cubic-bezier(0.22,1,0.36,1)`;
            element.innerHTML = '';
            element.appendChild(inner);
            setTimeout(() => { inner.style.transform = 'translateY(0)'; }, 30);
        }

        function applySplitReveal(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const mid   = Math.floor(text.length / 2);
            const delay = 40 / speed;
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                const dist = Math.abs(i - mid);
                const dir  = i < mid ? '40px' : '-40px';
                span.style.cssText = `display:inline-block;opacity:0;transform:translateX(${dir});transition:opacity 0.4s ease,transform 0.45s cubic-bezier(0.34,1.56,0.64,1)`;
                element.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; span.style.transform = 'translateX(0)'; }, 60 + dist * delay);
            });
        }

        function applyWaveSetup(element, text, speed) {
            if (!text) { element.innerHTML = ''; return; }
            element.innerHTML = '';
            const animDur = Math.max(0.5, 1.5 / speed) + 's';
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.className = 'wave-letter';
                span.style.animationDuration = animDur;
                span.style.animationDelay    = (i * 0.07) + 's';
                element.appendChild(span);
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        // OVERLAY CYCLE ENGINE WITH ENTRY/EXIT ANIMATIONS + ELEMENT STAGGER
        // ═══════════════════════════════════════════════════════════════════

        const OVERLAY_ANIM_MAP = {
            'fade':        { in:'overlayFadeIn',       out:'overlayFadeOut'       },
            'wipe-left':   { in:'overlayWipeInLeft',   out:'overlayWipeOutLeft'   },
            'wipe-right':  { in:'overlayWipeInRight',  out:'overlayWipeOutRight'  },
            'wipe-up':     { in:'overlayWipeInUp',     out:'overlayWipeOutUp'     },
            'wipe-down':   { in:'overlayWipeInDown',   out:'overlayWipeOutDown'   },
            'slide-left':  { in:'overlaySlideInLeft',  out:'overlaySlideOutLeft'  },
            'slide-right': { in:'overlaySlideInRight', out:'overlaySlideOutRight' },
            'slide-up':    { in:'overlaySlideInUp',    out:'overlaySlideOutUp'    },
            'slide-down':  { in:'overlaySlideInDown',  out:'overlaySlideOutDown'  },
            'split-h':     { in:'overlaySplitInH',     out:'overlaySplitOutH'     },
            'split-v':     { in:'overlaySplitInV',     out:'overlaySplitOutV'     },
            'iris':        { in:'overlayIrisIn',        out:'overlayIrisOut'       },
            'zoom-corner': { in:'overlayZoomCornerIn',  out:'overlayZoomCornerOut' },
            'venetian':    { in:'venetianIn',           out:'venetianOut'          },
        };

        const EL_ANIM_MAP = {
            'fade':       { out:'elFadeOut',       in:'elFadeIn'      },
            'slide-left': { out:'elSlideOutLeft',  in:'elSlideInLeft' },
            'slide-right':{ out:'elSlideOutRight', in:'elSlideInRight'},
            'slide-up':   { out:'elSlideOutUp',    in:'elSlideInUp'   },
            'slide-down': { out:'elSlideOutDown',  in:'elSlideInDown' },
            'shrink':     { out:'elShrinkOut',     in:'elGrowIn'      },
            'blur':       { out:'elBlurOut',       in:'elBlurIn'      },
        };

        function stopOverlayCycle() {
            if (overlayCycleTimer) { clearTimeout(overlayCycleTimer); overlayCycleTimer = null; }
        }

        function startOverlayCycle() {
            stopOverlayCycle();
            const s = currentSettings;
            if (!s.overlay_cycle_enabled || !s.is_visible) return;

            function elMap() {
                return { main: mainText, secondary: secondaryText, company: companyName };
            }

            function resetElements() {
                Object.values(elMap()).forEach(el => {
                    el.style.opacity = '';
                    el.style.transform = '';
                    el.style.filter = '';
                    el.style.transition = '';
                    el.style.animation = '';
                });
            }

            function animateContainer(dir, callback) {
                const s = currentSettings;
                const animName = dir === 'in'
                    ? (s.cycle_entry_animation || 'fade')
                    : (s.cycle_exit_animation  || 'fade');
                const dur = (s.cycle_transition_duration || 0.6) * 1000;
                const kf  = (OVERLAY_ANIM_MAP[animName] || OVERLAY_ANIM_MAP['fade'])[dir];

                // zoom-corner needs transform-origin bottom-left
                if (animName === 'zoom-corner') {
                    overlayContainer.style.transformOrigin = '0% 100%';
                } else {
                    overlayContainer.style.transformOrigin = '';
                }

                if (dir === 'in') overlayContainer.classList.add('visible');
                overlayContainer.style.animation = `${kf} ${dur}ms ease forwards`;

                overlayCycleTimer = setTimeout(() => {
                    overlayContainer.style.animation = '';
                    overlayContainer.style.clipPath   = '';
                    overlayContainer.style.transform  = '';
                    if (dir === 'out') overlayContainer.classList.remove('visible');
                    if (callback) callback();
                }, dur);
            }

            function staggerOut(callback) {
                const s     = currentSettings;
                const order = (s.stagger_order || 'main,secondary,company').split(',').map(k => k.trim());
                const delay = (s.stagger_delay || 0.3) * 1000;
                const eaDef = EL_ANIM_MAP[s.stagger_element_exit || 'fade'] || EL_ANIM_MAP['fade'];
                const dur   = 500;
                const em    = elMap();

                order.forEach((key, i) => {
                    const el = em[key];
                    if (!el || !el.textContent.trim()) return;
                    setTimeout(() => {
                        el.style.animation = `${eaDef.out} ${dur}ms ease forwards`;
                    }, i * delay);
                });

                overlayCycleTimer = setTimeout(callback, order.length * delay + dur + 60);
            }

            function staggerIn(callback) {
                const s     = currentSettings;
                const order = (s.stagger_order || 'main,secondary,company').split(',').map(k => k.trim()).reverse();
                const delay = (s.stagger_delay || 0.3) * 1000;
                const eaDef = EL_ANIM_MAP[s.stagger_element_entry || 'fade'] || EL_ANIM_MAP['fade'];
                const dur   = 500;
                const em    = elMap();

                Object.values(em).forEach(el => { el.style.opacity = '0'; el.style.animation = ''; });

                order.forEach((key, i) => {
                    const el = em[key];
                    if (!el) return;
                    setTimeout(() => {
                        el.style.animation = `${eaDef.in} ${dur}ms ease forwards`;
                    }, i * delay);
                });

                overlayCycleTimer = setTimeout(() => {
                    resetElements();
                    if (callback) callback();
                }, order.length * delay + dur + 60);
            }

            function doEntry() {
                resetElements();
                overlayCycleState = 'visible';
                animateContainer('in', () => {
                    const s = currentSettings;
                    if (s.stagger_enabled) {
                        staggerIn(scheduleVisible);
                    } else {
                        scheduleVisible();
                    }
                });
            }

            function scheduleVisible() {
                const s = currentSettings;
                if (!s.overlay_cycle_enabled) return;
                overlayCycleTimer = setTimeout(doExit, (s.overlay_visible_duration || 10) * 1000);
            }

            function doExit() {
                overlayCycleState = 'hidden';
                const s = currentSettings;
                const runContainerExit = () => animateContainer('out', scheduleHidden);
                if (s.stagger_enabled) {
                    staggerOut(runContainerExit);
                } else {
                    runContainerExit();
                }
            }

            function scheduleHidden() {
                const s = currentSettings;
                if (!s.overlay_cycle_enabled || !s.is_visible) return;
                overlayCycleTimer = setTimeout(doEntry, (s.overlay_hidden_duration || 5) * 1000);
            }

            doEntry();
        }


        function applyDecorations() {
            const s = currentSettings;
            if (s.show_decorative_elements) {
                lineSeparators.forEach(line => line.style.display = 'block');
                cornerBadges.forEach(badge => badge.style.display = 'block');
            } else {
                lineSeparators.forEach(line => line.style.display = 'none');
                cornerBadges.forEach(badge => badge.style.display = 'none');
            }
        }

        function applyAnimations() {
            const s = currentSettings;

            if (textAnimationTimeout) {
                clearTimeout(textAnimationTimeout);
                textAnimationTimeout = null;
            }

            let maxEntranceDuration = 0;
            const entranceDuration = s.entrance_duration || 1;
            const entranceDelay = s.entrance_delay || 0;
            const logoAnimDelay = s.logo_animation_delay || 0.3;
            const imageAnimDelay = s.image_animation_delay || 0.2;
            const tickerEntranceDelay = s.ticker_entrance_delay || 0.5;

            if (s.entrance_animation && s.entrance_animation !== 'none') {
                maxEntranceDuration = Math.max(maxEntranceDuration, entranceDuration + entranceDelay);
            }
            if (s.logo_animation && s.logo_animation !== 'none' && s.show_company_logo) {
                maxEntranceDuration = Math.max(maxEntranceDuration, entranceDuration + logoAnimDelay);
            }
            if (s.image_animation && s.image_animation !== 'none' && s.show_category_image) {
                maxEntranceDuration = Math.max(maxEntranceDuration, entranceDuration + imageAnimDelay);
            }
            if (s.ticker_entrance && s.ticker_entrance !== 'none' && s.show_ticker) {
                maxEntranceDuration = Math.max(maxEntranceDuration, entranceDuration + tickerEntranceDelay);
            }

            if (s.entrance_animation && s.entrance_animation !== 'none') {
                overlayContainer.className = overlayContainer.className.split(' ').filter(c => !c.startsWith('anim-')).join(' ');
                overlayContainer.classList.add('anim-' + s.entrance_animation);
                overlayContainer.style.animationDuration = entranceDuration + 's';
                overlayContainer.style.animationDelay = entranceDelay + 's';
            }

            if (s.logo_animation && s.logo_animation !== 'none') {
                companyLogo.className = companyLogo.className.split(' ').filter(c => !c.startsWith('anim-')).join(' ');
                companyLogo.classList.add('anim-' + s.logo_animation);
                companyLogo.style.animationDuration = entranceDuration + 's';
                companyLogo.style.animationDelay = logoAnimDelay + 's';
            }

            if (s.image_animation && s.image_animation !== 'none') {
                categoryImage.className = categoryImage.className.split(' ').filter(c => !c.startsWith('anim-')).join(' ');
                categoryImage.classList.add('anim-' + s.image_animation);
                categoryImage.style.animationDuration = entranceDuration + 's';
                categoryImage.style.animationDelay = imageAnimDelay + 's';
            }

            if (s.ticker_entrance && s.ticker_entrance !== 'none') {
                tickerContainer.className = tickerContainer.className.split(' ').filter(c => !c.startsWith('anim-')).join(' ');
                tickerContainer.classList.add('anim-' + s.ticker_entrance);
                tickerContainer.style.animationDuration = entranceDuration + 's';
                tickerContainer.style.animationDelay = tickerEntranceDelay + 's';
            }

            if (textAnimationTimeout) { clearTimeout(textAnimationTimeout); textAnimationTimeout = null; }
            if (textAnimRepeatTimer)  { clearInterval(textAnimRepeatTimer);  textAnimRepeatTimer  = null; }

        const CONTINUOUS_ANIMS = ['pulse','glow','float','bounce','shake','zoom','shimmer','neon-flicker','glitch','gradient-sweep','color-cycle','blur-pulse'];

            function applyContinuousAnims() {
                const s = currentSettings;
                const spd = (s.text_animation_speed || 2) + 's';
                const defs = [
                    { el: mainText,      animKey: 'main_text_animation' },
                    { el: secondaryText, animKey: 'secondary_text_animation' },
                    { el: companyName,   animKey: 'company_name_animation' }
                ];
                defs.forEach(({ el, animKey }) => {
                    const anim = (s[animKey] && s[animKey] !== 'none') ? s[animKey] : (s.text_animation || 'none');
                    el.className = el.className.split(' ').filter(c => !c.startsWith('text-')).join(' ');
                    if (CONTINUOUS_ANIMS.includes(anim) && el.textContent.trim()) {
                        el.classList.add('text-' + anim);
                        el.style.animationDuration = spd;
                    } else if (anim === 'wave') {
                        if (!el.querySelector('.wave-letter')) applyWaveSetup(el, el.textContent, parseFloat(s.text_animation_speed)||2);
                    }
                });
            }

            const delayMs = (maxEntranceDuration * 1000) + 100;
            textAnimationTimeout = setTimeout(() => {
                applyContinuousAnims();
                const repeatSecs = currentSettings.text_animation_repeat_interval || 0;
                if (repeatSecs > 0) {
                    textAnimRepeatTimer = setInterval(() => {
                        applyTextContent();
                        setTimeout(applyContinuousAnims, 200);
                    }, repeatSecs * 1000);
                }
            }, delayMs);

            if (s.logo_display_animation_enabled && s.logo_display_animation && s.logo_display_animation !== 'none') {
                companyLogo.className = companyLogo.className.split(' ').filter(c => !c.startsWith('display-')).join(' ');
                companyLogo.classList.add('display-' + s.logo_display_animation);
                if (s.logo_display_animation_duration) {
                    companyLogo.style.animationDuration = s.logo_display_animation_duration + 's';
                }
            }

            if (s.image_display_animation_enabled && s.image_display_animation && s.image_display_animation !== 'none') {
                categoryImage.className = categoryImage.className.split(' ').filter(c => !c.startsWith('display-')).join(' ');
                categoryImage.classList.add('display-' + s.image_display_animation);
                if (s.image_display_animation_duration) {
                    categoryImage.style.animationDuration = s.image_display_animation_duration + 's';
                }
            }
        }

        function startSecondaryRotation() {
            stopSecondaryRotation();
            if (!secondaryPhrases.length) return;
            const s = currentSettings;
            const duration = (s.secondary_display_duration || 3) * 1000;
            rotationInterval = setInterval(() => {
                phraseIndex = (phraseIndex + 1) % secondaryPhrases.length;
                const newText = secondaryPhrases[phraseIndex];
                const transitionType = s.secondary_transition_type || 'fade';
                const transitionDuration = (s.secondary_transition_duration || 0.5) * 1000;
                if (transitionType === 'fade') {
                    secondaryText.style.transition = `opacity ${transitionDuration}ms`;
                    secondaryText.style.opacity = '0';
                    setTimeout(() => {
                        secondaryText.textContent = newText;
                        secondaryText.style.opacity = '1';
                    }, transitionDuration);
                } else if (transitionType === 'slide') {
                    secondaryText.style.transition = `transform ${transitionDuration}ms, opacity ${transitionDuration}ms`;
                    secondaryText.style.transform = 'translateX(-50px)';
                    secondaryText.style.opacity = '0';
                    setTimeout(() => {
                        secondaryText.textContent = newText;
                        secondaryText.style.transform = 'translateX(0)';
                        secondaryText.style.opacity = '1';
                    }, transitionDuration);
                } else {
                    secondaryText.textContent = newText;
                }
            }, duration);
        }

        function stopSecondaryRotation() {
            if (rotationInterval) {
                clearInterval(rotationInterval);
                rotationInterval = null;
            }
        }

        function startTicker() {
            stopTicker();
            const s = currentSettings;
            const containerWidth = tickerContainer.offsetWidth;
            const contentWidth = tickerContent.scrollWidth;
            if (contentWidth <= containerWidth) {
                tickerContent.style.transform = 'translateX(0)';
                return;
            }
            const speed = s.ticker_speed || 50;
            const pixelsPerSecond = speed * 2;
            const totalDistance = contentWidth + containerWidth;
            const duration = (totalDistance / pixelsPerSecond) * 1000;
            let startTime = null;
            let startPos = containerWidth;
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = elapsed / duration;
                const currentPos = startPos - (totalDistance * progress);
                tickerContent.style.transform = `translateX(${currentPos}px)`;
                if (currentPos <= -contentWidth) {
                    startTime = timestamp;
                    startPos = containerWidth;
                }
                tickerAnimation = requestAnimationFrame(animate);
            }
            tickerAnimation = requestAnimationFrame(animate);
        }

        function stopTicker() {
            if (tickerAnimation) {
                cancelAnimationFrame(tickerAnimation);
                tickerAnimation = null;
            }
        }

        function hexToRgba(hex, alpha) {
            if (!hex || hex === 'transparent' || hex === '') return 'transparent';
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(c => c + c).join('');
            }
            const r = parseInt(hex.substring(0, 2), 16) || 0;
            const g = parseInt(hex.substring(2, 4), 16) || 0;
            const b = parseInt(hex.substring(4, 6), 16) || 0;
            let a = parseFloat(alpha);
            if (isNaN(a) || a === undefined || a === null) a = 1;
            a = Math.max(0, Math.min(1, a));
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        setInterval(updateDisplay, 2000);
        updateDisplay();
    </script>
