<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay Display</title>
<style>
/* ─── Reset ──────────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;position:relative}

/* ─── Company Logo ───────────────────────────────────────────────────────── */
#logo-wrap{position:absolute;z-index:100;display:none}
#logo-wrap.vis{display:block}
#logo-img{display:block;transition:all .3s ease}

/* ─── Overlay Container ──────────────────────────────────────────────────── */
#ov{
  position:absolute;
  overflow:visible;
  opacity:0;visibility:hidden;pointer-events:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:opacity .6s ease,visibility .6s ease;
}
#ov.vis{opacity:1;visibility:visible;pointer-events:auto}
/* Disable CSS transition during cycle so keyframes are sole opacity driver */
#ov.no-tr{transition:none!important}

/* ─── Inner layout ───────────────────────────────────────────────────────── */
#ov-inner{position:relative;display:flex;flex-direction:row;align-items:center;width:100%;height:100%}

/* ─── Corner accents — frame outside the overlay ─────────────────────────── */
.ca{position:absolute;width:18px;height:18px;border:2px solid;opacity:.7;pointer-events:none;display:none;z-index:20}
/* Offset outward by gap so they sit just outside the container border */
.ca-tl{top:-8px;left:-8px;border-right:none;border-bottom:none;border-radius:2px 0 0 0}
.ca-br{bottom:-8px;right:-8px;border-left:none;border-top:none;border-radius:0 0 2px 0}

/* ─── Category image ─────────────────────────────────────────────────────── */
#img-wrap{position:absolute;z-index:50;display:none}
#img-wrap.vis{display:block}
#cat-img{display:block}

/* Force sub-elements invisible the instant the cycle hides the overlay */
#ov.cycle-hidden #img-wrap,
#ov.cycle-hidden .ca{
  visibility:hidden!important;
  opacity:0!important;
  transition:none!important;
}

/* ─── Text content ───────────────────────────────────────────────────────── */
#txt{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
#main-txt,#sec-wrap,#co-name{word-wrap:break-word;overflow-wrap:break-word}
/* Wrapper div for secondary text — holds fixed dimensions during rotation */
#sec-wrap{position:relative;display:block}
#sec-txt{display:block}

/* ─── Clip shell — clips clock+ticker to the overlay's border-radius ─────── */
/* #ov stays overflow:visible so the category image can overhang outside it.  */
/* This inner shell mirrors the exact same border-radius and clips the strip.  */
#clip-shell{
  position:absolute;
  inset:0;
  border-radius:inherit;
  overflow:hidden;
  pointer-events:none;
  z-index:8;
}

/* ─── Ticker (inside overlay, bottom strip) ──────────────────────────────── */
#ticker-wrap{position:absolute;bottom:0;left:0;right:0;overflow:hidden;display:none;z-index:8}
#ticker-wrap.vis{display:block}
/* When clock is on — ticker left edge gets a \ slash matching clock's \ slash */
#ticker-wrap.clock-adjacent.pos-bottom{ clip-path:polygon(0 0,100% 0,100% 100%,28px 100%); }
#ticker-wrap.clock-adjacent.pos-top   { clip-path:polygon(28px 0,100% 0,100% 100%,0 100%); }
#ticker-inner{position:relative;width:100%;overflow:hidden;display:flex;align-items:center}
#ticker-txt{display:inline-block;white-space:nowrap;padding:0;font-weight:500;letter-spacing:.5px;will-change:transform}

/* ════════════════════════════════════════════════════════════════════════════
   ENTRANCE ANIMATIONS  (class = "anim-" + settings value)
════════════════════════════════════════════════════════════════════════════ */
@keyframes kFadeIn      {from{opacity:0}to{opacity:1}}
@keyframes kSlideInLeft {from{opacity:0;transform:translateX(-110%)}to{opacity:1;transform:translateX(0)}}
@keyframes kSlideInRight{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes kSlideInUp   {from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes kSlideInDown {from{opacity:0;transform:translateY(-80px)}to{opacity:1;transform:translateY(0)}}
@keyframes kZoomIn      {from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes kScaleIn     {from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
@keyframes kRotateIn    {from{opacity:0;transform:rotate(-180deg) scale(.5)}to{opacity:1;transform:rotate(0deg) scale(1)}}
@keyframes kBounceIn    {0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.06)}70%{transform:scale(.93)}100%{transform:scale(1)}}
@keyframes kFlipIn      {from{opacity:0;transform:perspective(400px) rotateY(90deg)}to{opacity:1;transform:perspective(400px) rotateY(0deg)}}
/* Photo reveal: clip-path circle + desaturate-to-colour */
@keyframes kPhotoReveal {from{clip-path:circle(0% at 50% 50%);filter:grayscale(1)}to{clip-path:circle(50% at 50% 50%);filter:grayscale(0)}}

.anim-fadeIn,.anim-fade-in    {animation-name:kFadeIn;      animation-fill-mode:both}
.anim-slideInLeft,.anim-slide-in-left,.anim-slide-left{animation-name:kSlideInLeft; animation-fill-mode:both}
.anim-slideInRight,.anim-slide-in-right,.anim-slide-right{animation-name:kSlideInRight;animation-fill-mode:both}
.anim-slideInUp,.anim-slide-in-up,.anim-slide-up{animation-name:kSlideInUp;   animation-fill-mode:both}
.anim-slideInDown,.anim-slide-in-down,.anim-slide-down{animation-name:kSlideInDown; animation-fill-mode:both}
.anim-zoomIn,.anim-zoom-in    {animation-name:kZoomIn;      animation-fill-mode:both}
.anim-scaleIn,.anim-scale-in  {animation-name:kScaleIn;     animation-fill-mode:both}
.anim-rotateIn,.anim-rotate-in{animation-name:kRotateIn;    animation-fill-mode:both}
.anim-bounceIn,.anim-bounce-in{animation-name:kBounceIn;    animation-fill-mode:both}
.anim-flipIn,.anim-flip-in    {animation-name:kFlipIn;      animation-fill-mode:both}
.anim-photo-reveal            {animation-name:kPhotoReveal; animation-fill-mode:both}

/* ════════════════════════════════════════════════════════════════════════════
   CONTINUOUS TEXT ANIMATIONS  (class = "text-" + settings value)
════════════════════════════════════════════════════════════════════════════ */
@keyframes tPulse     {0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.03);opacity:.88}}
@keyframes tGlow      {0%,100%{text-shadow:0 2px 10px rgba(0,0,0,.3)}50%{text-shadow:0 0 30px currentColor,0 2px 10px rgba(0,0,0,.3)}}
@keyframes tFloat     {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes tBounce    {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes tShake     {0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes tZoom      {0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes tShimmer   {0%,80%,100%{text-shadow:none;filter:brightness(1)}20%{text-shadow:-12px 0 14px rgba(255,255,255,.6);filter:brightness(1.3)}40%{text-shadow:0 0 20px rgba(255,255,255,.85);filter:brightness(1.6)}60%{text-shadow:12px 0 14px rgba(255,255,255,.6);filter:brightness(1.3)}}
@keyframes tNeonFlicker{0%,18%,22%,25%,53%,57%,100%{text-shadow:0 0 5px #fff,0 0 12px currentColor,0 0 25px currentColor,0 0 45px currentColor;opacity:1}20%,24%,55%{text-shadow:none;opacity:.4}}
@keyframes tGlitch    {0%,6%,48%,54%,100%{transform:translate(0);text-shadow:none}2%{transform:translate(-3px,1px);text-shadow:-3px 0 0 rgba(255,0,0,.7),3px 0 0 rgba(0,255,255,.7)}4%{transform:translate(3px,-1px);text-shadow:3px 0 0 rgba(255,0,0,.7),-3px 0 0 rgba(0,255,255,.7)}50%{transform:translate(2px,2px);text-shadow:-2px 0 0 rgba(255,0,0,.5)}52%{transform:translate(-2px,-2px);text-shadow:2px 0 0 rgba(0,255,255,.5)}}
@keyframes tGradient  {0%,100%{filter:hue-rotate(0deg)brightness(1)}25%{filter:hue-rotate(30deg)brightness(1.1)}50%{filter:hue-rotate(60deg)brightness(1.2)}75%{filter:hue-rotate(30deg)brightness(1.1)}}
@keyframes tColorCycle{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
@keyframes tBlurPulse {0%,100%{filter:blur(0px)brightness(1)}50%{filter:blur(2.5px)brightness(1.2)}}
@keyframes tWaveLetter{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes twBlink    {50%{opacity:0}}

.text-pulse         {animation:tPulse        2s   ease-in-out infinite}
.text-glow          {animation:tGlow         2s   ease-in-out infinite}
.text-float         {animation:tFloat        3s   ease-in-out infinite}
.text-bounce        {animation:tBounce       2s   ease-in-out infinite}
.text-shake         {animation:tShake        2s   ease-in-out infinite}
.text-zoom          {animation:tZoom         2s   ease-in-out infinite}
.text-shimmer       {animation:tShimmer      2.5s ease-in-out infinite}
.text-neon-flicker  {animation:tNeonFlicker  3.5s linear      infinite}
.text-glitch        {animation:tGlitch       4s   steps(1)    infinite}
.text-gradient-sweep{animation:tGradient     4s   ease-in-out infinite}
.text-color-cycle   {animation:tColorCycle   5s   linear      infinite}
.text-blur-pulse    {animation:tBlurPulse    2.5s ease-in-out infinite}
.wave-letter        {display:inline-block;animation:tWaveLetter 1s ease-in-out infinite}
.tw-cursor          {display:inline-block;width:2px;height:1em;background:currentColor;margin-left:2px;animation:twBlink 1s step-start infinite;vertical-align:text-bottom}

/* ════════════════════════════════════════════════════════════════════════════
   CONTINUOUS DISPLAY ANIMATIONS  logo / image  (class = "display-" + value)
════════════════════════════════════════════════════════════════════════════ */
@keyframes dPulse     {0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes dBounce    {0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes dShake     {0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes dFloat     {0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes dGlow      {0%,100%{filter:brightness(1) drop-shadow(0 4px 12px rgba(0,0,0,.4))}50%{filter:brightness(1.2) drop-shadow(0 4px 20px rgba(255,215,0,.6))}}
@keyframes dRotate    {from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
@keyframes dFlip      {0%,100%{transform:rotateY(0)}50%{transform:rotateY(180deg)}}
@keyframes dZoom      {0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes dPan       {0%,100%{transform:translateX(0) scale(1.05)}50%{transform:translateX(-5%) scale(1.05)}}
@keyframes dTilt      {0%,100%{transform:rotate(0deg)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes dSwing     {0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

.display-pulse      {animation:dPulse     2s   ease-in-out infinite}
.display-bounce     {animation:dBounce    2s   ease-in-out infinite}
.display-shake      {animation:dShake     2s   ease-in-out infinite}
.display-float      {animation:dFloat     3s   ease-in-out infinite}
.display-glow       {animation:dGlow      3s   ease-in-out infinite}
.display-rotate-slow{animation:dRotate    10s  linear      infinite}
.display-flip       {animation:dFlip      4s   ease-in-out infinite}
.display-flip-slow  {animation:dRotate    12s  linear      infinite}
.display-zoom-slow  {animation:dZoom      8s   ease-in-out infinite}
.display-pan        {animation:dPan       10s  ease-in-out infinite}
.display-tilt       {animation:dTilt      3s   ease-in-out infinite}
.display-swing      {animation:dSwing     2s   ease-in-out infinite}

/* ════════════════════════════════════════════════════════════════════════════
   CYCLE (overlay entry / exit) KEYFRAMES
════════════════════════════════════════════════════════════════════════════ */
@keyframes oFadeIn    {from{opacity:0}to{opacity:1}}
@keyframes oFadeOut   {from{opacity:1}to{opacity:0}}
@keyframes oWipeInL   {from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes oWipeOutL  {from{clip-path:inset(0 0 0 0)}to{clip-path:inset(0 0 0 100%)}}
@keyframes oWipeInR   {from{clip-path:inset(0 0 0 100%)}to{clip-path:inset(0 0 0 0)}}
@keyframes oWipeOutR  {from{clip-path:inset(0 0 0 0)}to{clip-path:inset(0 100% 0 0)}}
@keyframes oWipeInU   {from{clip-path:inset(100% 0 0 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes oWipeOutU  {from{clip-path:inset(0 0 0 0)}to{clip-path:inset(0 0 100% 0)}}
@keyframes oWipeInD   {from{clip-path:inset(0 0 100% 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes oWipeOutD  {from{clip-path:inset(0 0 0 0)}to{clip-path:inset(100% 0 0 0)}}
@keyframes oSlideInL  {from{opacity:0;transform:translateX(-110%)}to{opacity:1;transform:translateX(0)}}
@keyframes oSlideOutL {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-110%)}}
@keyframes oSlideInR  {from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes oSlideOutR {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(110%)}}
@keyframes oSlideInU  {from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes oSlideOutU {from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-80px)}}
@keyframes oSlideInD  {from{opacity:0;transform:translateY(-80px)}to{opacity:1;transform:translateY(0)}}
@keyframes oSlideOutD {from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(80px)}}
@keyframes oSplitInH  {from{clip-path:polygon(0 50%,100% 50%,100% 50%,0 50%)}to{clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}}
@keyframes oSplitOutH {from{clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}to{clip-path:polygon(0 50%,100% 50%,100% 50%,0 50%)}}
@keyframes oSplitInV  {from{clip-path:polygon(50% 0,50% 0,50% 100%,50% 100%)}to{clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}}
@keyframes oSplitOutV {from{clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}to{clip-path:polygon(50% 0,50% 0,50% 100%,50% 100%)}}
@keyframes oIrisIn    {from{clip-path:circle(0% at 50% 50%)}to{clip-path:circle(150% at 50% 50%)}}
@keyframes oIrisOut   {from{clip-path:circle(150% at 50% 50%)}to{clip-path:circle(0% at 50% 50%)}}
@keyframes oZoomCornIn{from{opacity:0;transform:scale(.05)}to{opacity:1;transform:scale(1)}}
@keyframes oZoomCornOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.05)}}
@keyframes oVenetianIn{0%{clip-path:inset(0 0 95% 0)}20%{clip-path:inset(0 0 75% 0)}40%{clip-path:inset(0 0 55% 0)}60%{clip-path:inset(0 0 35% 0)}80%{clip-path:inset(0 0 15% 0)}100%{clip-path:inset(0 0 0% 0)}}
@keyframes oVenetianOut{from{clip-path:inset(0 0 0% 0)}to{clip-path:inset(0 0 100% 0)}}

/* ════════════════════════════════════════════════════════════════════════════
   ELEMENT STAGGER KEYFRAMES
════════════════════════════════════════════════════════════════════════════ */
@keyframes eFadeIn  {from{opacity:0}to{opacity:1}}
@keyframes eFadeOut {to{opacity:0}}
@keyframes eSlInL   {from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes eSlOutL  {to{opacity:0;transform:translateX(-60px)}}
@keyframes eSlInR   {from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes eSlOutR  {to{opacity:0;transform:translateX(60px)}}
@keyframes eSlInU   {from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes eSlOutU  {to{opacity:0;transform:translateY(-30px)}}
@keyframes eSlInD   {from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes eSlOutD  {to{opacity:0;transform:translateY(30px)}}
@keyframes eGrowIn  {from{opacity:0;transform:scale(0) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes eShrinkOut{to{opacity:0;transform:scale(0) rotate(6deg)}}
@keyframes eBlurIn  {from{opacity:0;filter:blur(14px)}to{opacity:1;filter:blur(0)}}
@keyframes eBlurOut {to{opacity:0;filter:blur(14px)}}

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media(max-width:768px){
  #cat-img{width:100px!important;height:100px!important}
}

/* ─── Clock tab (inside overlay, left-flush, right side slanted) ─────────── */
#clock-el{
  display:none;
  position:absolute;
  left:0;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
  letter-spacing:.06em;
  padding:0 44px 0 20px;
  pointer-events:none;
  z-index:10;
  /* height + line-height set in JS to match ticker */
  align-items:center;
  justify-content:flex-start;
}
#clock-el.vis{display:flex}
/* Bottom-left — right edge slants: top-right recedes, bottom-right is at container left-flush */
#clock-el.pos-bottom{
  bottom:0;top:auto;
  clip-path:polygon(0 0,calc(100% - 28px) 0,100% 100%,0 100%);
}
/* Top-left — mirror: right edge slants the other way */
#clock-el.pos-top{
  top:0;bottom:auto;
  clip-path:polygon(0 0,100% 0,calc(100% - 28px) 100%,0 100%);
}


/* ─── Live Indicator ─────────────────────────────────────────────────────── */
#live-indicator{
  position:fixed;
  z-index:200;
  display:none;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  border-radius:6px;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  pointer-events:none;
}
#live-indicator.vis{display:flex}
#live-dot{
  width:10px;height:10px;border-radius:50%;background:currentColor;
  animation:liveDotPulse 1.4s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes liveDotPulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,255,255,.5)}
  50%{opacity:.25;box-shadow:0 0 0 5px rgba(255,255,255,0)}
}
#live-label-txt{
  font-weight:800;letter-spacing:2px;font-size:inherit;
  display:inline-flex;align-items:center;
  border-radius:4px;
  /* padding/bg set via JS when a per-part background is active */
}
#live-sep{margin:0 4px;font-size:.85em;font-weight:300;line-height:1}
#live-location-txt{
  font-weight:400;font-size:.9em;letter-spacing:.5px;
  display:inline-flex;align-items:center;
  border-radius:4px;
  /* padding/bg set via JS when a per-part background is active */
}
</style>
</head>
<body>

<!-- Company Logo -->
<div id="logo-wrap"><img id="logo-img" src="" alt="Logo"></div>

<!-- Live Indicator -->
<div id="live-indicator">
  <div id="live-dot"></div>
  <span id="live-label-txt">LIVE</span>
  <span id="live-sep">&#x2502;</span>
  <span id="live-location-txt"></span>
</div>

<!-- Main Overlay -->
<div id="ov">
  <div id="ov-inner">
    <div class="ca ca-tl"></div>
    <div class="ca ca-br"></div>
    <!-- Clip shell: clips clock+ticker to border-radius; ov stays overflow:visible for image -->
    <div id="clip-shell">
      <!-- Clock tab — inside overlay, left edge flush with container, right side slanted -->
      <div id="clock-el"></div>
      <!-- Ticker — inside overlay, bottom strip; left offset when clock is on -->
      <div id="ticker-wrap">
        <div id="ticker-inner">
          <div id="ticker-txt"></div>
        </div>
      </div>
    </div>
    <div id="img-wrap"><img id="cat-img" src="" alt=""></div>
    <div id="txt">
      <div id="main-txt"></div>
      <!-- Wrapper holds fixed min-dimensions during secondary phrase rotation -->
      <div id="sec-wrap"><div id="sec-txt"></div></div>
      <div id="co-name"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const CAT = new URLSearchParams(location.search).get('category') || 'funeral';

/* ── DOM refs ─────────────────────────────────────────────────────────────── */
const ovEl         = document.getElementById('ov');
const mainEl       = document.getElementById('main-txt');
const secWrapEl    = document.getElementById('sec-wrap');
const secEl        = document.getElementById('sec-txt');
const coEl         = document.getElementById('co-name');
const imgWrapEl    = document.getElementById('img-wrap');
const catImgEl     = document.getElementById('cat-img');
const logoWrapEl   = document.getElementById('logo-wrap');
const logoImgEl    = document.getElementById('logo-img');
const tickerWrapEl = document.getElementById('ticker-wrap');
const tickerTxtEl  = document.getElementById('ticker-txt');
const txtEl        = document.getElementById('txt');
const cornerEls    = document.querySelectorAll('.ca');
const clockEl      = document.getElementById('clock-el');
const liveIndEl    = document.getElementById('live-indicator');
const liveLabelEl  = document.getElementById('live-label-txt');
const liveSepEl    = document.getElementById('live-sep');
const liveLocEl    = document.getElementById('live-location-txt');
const liveDotEl    = document.getElementById('live-dot');

/* ── Runtime state ────────────────────────────────────────────────────────── */
let cur = {}, phrases = [], phraseIdx = 0;
let rotTimer = null, rotPendingTimer = null, tickerRAF = null;
let cycleTimer = null, cycleOn = false;
let twTimers = { main: null, sec: null, co: null };
let txtAnimTO = null, txtRepeatTO = null;
let clockRAF = null;

/* ── Lookup tables ────────────────────────────────────────────────────────── */
const CYCLE_MAP = {
  'fade'       :{ i:'oFadeIn',     o:'oFadeOut'    },
  'wipe-left'  :{ i:'oWipeInL',    o:'oWipeOutL'   },
  'wipe-right' :{ i:'oWipeInR',    o:'oWipeOutR'   },
  'wipe-up'    :{ i:'oWipeInU',    o:'oWipeOutU'   },
  'wipe-down'  :{ i:'oWipeInD',    o:'oWipeOutD'   },
  'slide-left' :{ i:'oSlideInL',   o:'oSlideOutL'  },
  'slide-right':{ i:'oSlideInR',   o:'oSlideOutR'  },
  'slide-up'   :{ i:'oSlideInU',   o:'oSlideOutU'  },
  'slide-down' :{ i:'oSlideInD',   o:'oSlideOutD'  },
  'split-h'    :{ i:'oSplitInH',   o:'oSplitOutH'  },
  'split-v'    :{ i:'oSplitInV',   o:'oSplitOutV'  },
  'iris'       :{ i:'oIrisIn',     o:'oIrisOut'    },
  'zoom-corner':{ i:'oZoomCornIn', o:'oZoomCornOut'},
  'venetian'   :{ i:'oVenetianIn', o:'oVenetianOut'},
};

const STAGGER_MAP = {
  'fade'       :{ i:'eFadeIn',  o:'eFadeOut'  },
  'slide-left' :{ i:'eSlInL',   o:'eSlOutL'   },
  'slide-right':{ i:'eSlInR',   o:'eSlOutR'   },
  'slide-up'   :{ i:'eSlInU',   o:'eSlOutU'   },
  'slide-down' :{ i:'eSlInD',   o:'eSlOutD'   },
  'shrink'     :{ i:'eGrowIn',  o:'eShrinkOut'},
  'blur'       :{ i:'eBlurIn',  o:'eBlurOut'  },
};

const CONTINUOUS_SET = new Set([
  'pulse','glow','float','bounce','shake','zoom',
  'shimmer','neon-flicker','glitch','gradient-sweep','color-cycle','blur-pulse'
]);

/* ════════════════════════════════════════════════════════════════════════════
   MASTER APPLY
════════════════════════════════════════════════════════════════════════════ */
function applySettings(s) {
  /* 1. Visibility / cycle */
  if (s.is_visible) {
    if (s.overlay_cycle_enabled) { startCycle(s); }
    else { stopCycle(); ovEl.classList.add('vis'); }
  } else {
    stopCycle();
    ovEl.classList.remove('vis');
    ovEl.style.visibility = '';
  }

  /* 2. Style, layout, assets */
  applyStyling(s);
  applyPositioning(s);
  applyDecorations(s);
  applyAssets(s);

  /* 3. Phrase data + text */
  phrases = s.secondary_phrases || [];
  applyText(s);

  /* 4. Secondary rotation */
  if (s.secondary_rotation_enabled && phrases.length > 0) startRotation(s);
  else stopRotation();

  /* 5. Animations — last, so elements exist and are visible */
  applyAnimations(s);

  /* 6. Clock & live indicator */
  applyClock(s);
  applyLiveIndicator(s);
}

/* ════════════════════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════════════════════ */
function toRgba(hex, a) {
  if (!hex || hex === 'transparent' || hex === '') return 'transparent';
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.slice(0, 2), 16) || 0;
  const g = parseInt(hex.slice(2, 4), 16) || 0;
  const b = parseInt(hex.slice(4, 6), 16) || 0;
  a = parseFloat(a); if (isNaN(a)) a = 1;
  return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, a))})`;
}

function stripClass(el, prefix) {
  el.className = el.className.split(' ').filter(c => !c.startsWith(prefix)).join(' ');
}

function resolveAnim(specific, fallback) {
  if (specific && specific !== 'none') return specific;
  if (fallback && fallback !== 'none') return fallback;
  return 'none';
}

/* Pre-calculate the maximum rendered width & height of all phrases so the
   secondary-text wrapper can be locked to those dimensions, preventing the
   overlay from resizing or reflowing during phrase rotation. */
function calcSecondaryDims(phrases, fontSize, fontFamily, lineHeight, maxW, hasBg, bgPad) {
  if (!phrases || !phrases.length) return { w: 0, h: 0 };
  const tmp = document.createElement('div');
  tmp.style.cssText = [
    'position:absolute', 'visibility:hidden', 'pointer-events:none',
    `font-size:${fontSize}px`, `font-family:${fontFamily}`,
    'font-weight:400', 'letter-spacing:0.3px', `line-height:${lineHeight}`,
    'word-wrap:break-word', 'overflow-wrap:break-word',
    `max-width:${maxW}px`,
  ].join(';');
  if (hasBg && bgPad) {
    tmp.style.padding = bgPad;
    tmp.style.borderRadius = '6px';
    tmp.style.display = 'inline-block';
  }
  document.body.appendChild(tmp);
  let maxWidth = 0, maxHeight = 0;
  phrases.forEach(p => {
    tmp.textContent = p;
    const r = tmp.getBoundingClientRect();
    if (r.width  > maxWidth)  maxWidth  = r.width;
    if (r.height > maxHeight) maxHeight = r.height;
  });
  document.body.removeChild(tmp);
  return { w: Math.ceil(maxWidth), h: Math.ceil(maxHeight) };
}

/* ════════════════════════════════════════════════════════════════════════════
   STYLING
════════════════════════════════════════════════════════════════════════════ */
function styleTextEl(el, o) {
  el.style.fontSize   = o.size   + 'px';
  el.style.color      = o.color  || '';
  el.style.fontFamily = o.family || 'Segoe UI,sans-serif';
  if (o.lh) el.style.lineHeight = o.lh;
  const op = (o.bgOp != null && o.bgOp !== '') ? parseFloat(o.bgOp) : 0;
  if (o.bg && o.bg !== 'transparent' && o.bg !== '' && op > 0) {
    el.style.backgroundColor = toRgba(o.bg, op);
    el.style.padding         = o.pad  || '8px 12px';
    el.style.borderRadius    = '6px';
    el.style.display         = 'inline-block';
  } else {
    el.style.backgroundColor = 'transparent';
    el.style.padding         = '0';
    el.style.display         = 'block';
  }
}

function applyStyling(s) {
  const gf = s.font_family || 'Segoe UI,sans-serif';

  /* Overall overlay */
  if (s.overlay_bg_sections_enabled) {
    const topH    = Math.max(0, Math.min(50, s.overlay_bg_top_height    || 25));
    const botH    = Math.max(0, Math.min(50, s.overlay_bg_bottom_height || 25));
    const midH    = 100 - topH - botH;
    const topRgba = toRgba(s.overlay_bg_top_color    || '#222222', s.overlay_bg_top_opacity    != null ? s.overlay_bg_top_opacity    : 0.95);
    const midRgba = toRgba(s.overlay_bg_color        || '#000000', s.overlay_bg_opacity        != null ? s.overlay_bg_opacity        : 0.90);
    const botRgba = toRgba(s.overlay_bg_bottom_color || '#222222', s.overlay_bg_bottom_opacity != null ? s.overlay_bg_bottom_opacity : 0.95);
    ovEl.style.background = `linear-gradient(to bottom,
      ${topRgba} 0%,
      ${topRgba} ${topH}%,
      ${midRgba} ${topH}%,
      ${midRgba} ${topH + midH}%,
      ${botRgba} ${topH + midH}%,
      ${botRgba} 100%)`;
  } else {
    ovEl.style.background = '';
    ovEl.style.backgroundColor = toRgba(s.overlay_bg_color || '#1a1a1a', s.overlay_bg_opacity != null ? s.overlay_bg_opacity : 0.85);
  }
  const _br = (s.border_radius || 15) + 'px';
  ovEl.style.borderRadius = _br;
  /* clip-shell uses overflow:hidden to clip clock+ticker — must match ov's radius exactly */
  document.getElementById('clip-shell').style.borderRadius = _br;
  /* Store target opacity so cycle engine can restore it on show */
  const targetOp = s.opacity != null ? s.opacity : 0.9;
  ovEl.dataset.targetOpacity = targetOp;
  if (ovEl.style.opacity !== '0') ovEl.style.opacity = targetOp;
  ovEl.style.border = (s.border_width > 0)
    ? `${s.border_width}px solid ${s.border_color || '#FFD700'}`
    : 'none';

  /* Expose accent / border colors as CSS vars (used by gradient image border if any) */
  document.documentElement.style.setProperty('--accent-color',       s.accent_color  || '#86efac');
  document.documentElement.style.setProperty('--border-color',       s.border_color  || '#10b981');

  /* Main text */
  styleTextEl(mainEl, {
    size:  s.main_font_size      || 48,
    color: s.main_text_color     || '#FFFFFF',
    family:s.main_font_family    || gf,
    bg:    s.main_text_bg_color,
    bgOp:  s.main_text_bg_opacity,
    lh:    s.text_line_height    || 1.2,
    pad:   '10px 15px',
  });

  /* Secondary text */
  const secFontSize   = s.secondary_font_size      || 28;
  const secFontFamily = s.secondary_font_family    || gf;
  const secLineHeight = s.text_line_height         || 1.3;
  const secBgOp       = parseFloat(s.secondary_text_bg_opacity) || 0;
  const hasSecBg      = !!(s.secondary_text_bg_color && s.secondary_text_bg_color !== 'transparent' && secBgOp > 0);

  styleTextEl(secEl, {
    size:  secFontSize,
    color: s.secondary_text_color    || '#E0E0E0',
    family:secFontFamily,
    lh:    secLineHeight,
    bg:    s.secondary_text_bg_color,
    bgOp:  s.secondary_text_bg_opacity,
  });

  /* Lock secondary wrapper dimensions so overlay never reflowing during rotation */
  if (s.secondary_rotation_enabled && phrases.length > 0) {
    const containerMaxW = (s.container_max_width || 900) - (s.container_padding || 25) * 2 - 80;
    const dims = calcSecondaryDims(phrases, secFontSize, secFontFamily, secLineHeight,
                                   containerMaxW, hasSecBg, hasSecBg ? '8px 12px' : '0');
    if (dims.w > 0 && dims.h > 0) {
      secWrapEl.style.minWidth  = dims.w + 'px';
      secWrapEl.style.minHeight = dims.h + 'px';
    }
  } else {
    secWrapEl.style.minWidth = secWrapEl.style.minHeight = 'auto';
  }

  /* Company name */
  styleTextEl(coEl, {
    size:  s.company_name_font_size   || 20,
    color: s.company_name_color       || '#B0B0B0',
    family:s.company_name_font_family || gf,
    bg:    s.company_name_bg_color,
    bgOp:  s.company_name_bg_opacity,
    pad:   '6px 10px',
  });
  coEl.style.fontWeight = '500';
  coEl.style.opacity    = '0.85';
  coEl.style.fontStyle  = (s.company_name_italic !== false) ? 'italic' : 'normal';

  /* Show / hide secondary text and company name (collapses space when off) */
  secWrapEl.style.display = (s.show_secondary_text === false) ? 'none' : '';
  coEl.style.display      = (s.show_company_name   === false) ? 'none' : '';

  /* Ticker */
  const tkFontSize = s.ticker_font_size || 13;
  tickerWrapEl.style.backgroundColor = toRgba(s.ticker_bg_color || '#1a1a1a', s.ticker_bg_opacity != null ? s.ticker_bg_opacity : 0.8);
  tickerTxtEl.style.fontSize         = tkFontSize + 'px';
  tickerTxtEl.style.color            = s.ticker_text_color  || '#FFFFFF';
  tickerTxtEl.style.fontFamily       = s.ticker_font_family || gf;
}

/* ════════════════════════════════════════════════════════════════════════════
   POSITIONING
════════════════════════════════════════════════════════════════════════════ */
function applyPositioning(s) {
  const pad = s.container_padding != null ? s.container_padding : 25;
  const vp  = s.vertical_position   || 'bottom';
  const hp  = s.horizontal_position || 'left';

  /* ── Vertical ─────────────────────────────────────────────────────────── */
  ovEl.style.top = ovEl.style.bottom = 'auto';
  ovEl.style.transform = 'none';
  if      (vp === 'top')    { ovEl.style.top    = '20px'; }
  else if (vp === 'middle'  || vp === 'center') { ovEl.style.top = '50%'; ovEl.style.transform = 'translateY(-50%)'; }
  else if (vp === 'bottom') { ovEl.style.bottom = '20px'; }
  else if (vp === 'custom') {
    if      (s.custom_top    != null) { ovEl.style.top    = s.custom_top    + 'px'; }
    else if (s.custom_bottom != null) { ovEl.style.bottom = s.custom_bottom + 'px'; }
  }

  /* ── Horizontal ───────────────────────────────────────────────────────── */
  const vCenter = (vp === 'middle' || vp === 'center');
  ovEl.style.left = ovEl.style.right = 'auto';
  if      (hp === 'left')   { ovEl.style.left  = '80px';  if (!vCenter) ovEl.style.transform = 'none'; }
  else if (hp === 'center') { ovEl.style.left  = '50%';   ovEl.style.transform = vCenter ? 'translate(-50%,-50%)' : 'translateX(-50%)'; }
  else if (hp === 'right')  { ovEl.style.right = '20px';  if (!vCenter) ovEl.style.transform = 'none'; }
  else if (hp === 'custom') {
    if      (s.custom_left  != null) { ovEl.style.left  = s.custom_left  + 'px'; }
    else if (s.custom_right != null) { ovEl.style.right = s.custom_right + 'px'; }
    if (!vCenter) ovEl.style.transform = 'none';
  }

  /* ── Dimensions ───────────────────────────────────────────────────────── */
  if (s.container_width === 'full') {
    ovEl.style.width = '100%'; ovEl.style.maxWidth = ''; ovEl.style.minWidth = '';
  } else if (s.container_width === 'custom' && s.custom_width) {
    ovEl.style.width = s.custom_width + 'px'; ovEl.style.maxWidth = ''; ovEl.style.minWidth = '';
  } else {
    ovEl.style.width    = 'auto';
    ovEl.style.maxWidth = (s.container_max_width || 900) + 'px';
    ovEl.style.minWidth = (s.container_min_width || 400) + 'px';
  }
  ovEl.style.height = (s.container_height === 'custom' && s.custom_height) ? s.custom_height + 'px' : 'auto';

  /* ── Image layout ─────────────────────────────────────────────────────── */
  /* Reset ALL text padding first, then override per-position below */
  txtEl.style.paddingTop    = pad + 'px';
  txtEl.style.paddingBottom = pad + 'px';
  txtEl.style.paddingLeft   = pad + 'px';
  txtEl.style.paddingRight  = pad + 'px';

  const sz   = s.image_size || 128;
  const half = Math.round(sz / 2);
  const gap  = 4;
  const ipos = s.image_position || 'left';

  /* Full reset of image wrapper position */
  imgWrapEl.style.position  = 'absolute';
  imgWrapEl.style.left = imgWrapEl.style.right = imgWrapEl.style.top = imgWrapEl.style.bottom = 'auto';
  imgWrapEl.style.transform = 'none';

  if (s.show_category_image && s.category_image) {
    // Pre-calculate bottom-strip height (clock + ticker) from settings — same formula as syncStripHeight.
    // Used to shift left/right images upward so they don't overlap the clock/ticker strip.
    const _clockOn  = s.show_clock;
    // Ticker is flowing text — image overlapping it is fine. Only the static clock
    // block needs the image shifted up to avoid being physically covered.
    const _stripFs  = parseFloat(s.clock_font_size || 13);
    const _stripH   = _clockOn ? Math.round(_stripFs * 2.4) : 0;
    // Shift image centre up by half the clock strip height; stays at 50% when clock is off
    const _stripOff = _stripH > 0 ? Math.round(_stripH / 2) : 0;

    if      (ipos === 'left')      { imgWrapEl.style.left   = -half+'px'; imgWrapEl.style.top    = _stripOff > 0 ? `calc(50% - ${_stripOff}px)` : '50%'; imgWrapEl.style.transform = 'translateY(-50%)'; txtEl.style.paddingLeft   = (pad+half+gap)+'px'; }
    else if (ipos === 'right')     { imgWrapEl.style.right  = -half+'px'; imgWrapEl.style.top    = _stripOff > 0 ? `calc(50% - ${_stripOff}px)` : '50%'; imgWrapEl.style.transform = 'translateY(-50%)'; txtEl.style.paddingRight  = (pad+half+gap)+'px'; }
    // For top/bottom/corner positions: use only pad+gap (not pad+half+gap) so the overlay
    // background doesn't grow an empty zone — the image simply hugs / overlaps the edge.
    else if (ipos === 'top')       { imgWrapEl.style.top    = -half+'px'; imgWrapEl.style.left   = '50%'; imgWrapEl.style.transform = 'translateX(-50%)'; txtEl.style.paddingTop    = (pad+gap)+'px'; }
    else if (ipos === 'bottom')    { imgWrapEl.style.bottom = -half+'px'; imgWrapEl.style.left   = '50%'; imgWrapEl.style.transform = 'translateX(-50%)'; txtEl.style.paddingBottom = (pad+gap)+'px'; }
    else if (ipos === 'top-left')  { imgWrapEl.style.top    = -half+'px'; imgWrapEl.style.left   = -half+'px'; txtEl.style.paddingTop  = (pad+gap)+'px'; txtEl.style.paddingLeft   = (pad+half+gap)+'px'; }
    else if (ipos === 'top-right') { imgWrapEl.style.top    = -half+'px'; imgWrapEl.style.right  = -half+'px'; txtEl.style.paddingTop  = (pad+gap)+'px'; txtEl.style.paddingRight  = (pad+half+gap)+'px'; }
  }

  /* ── Image appearance ────────────────────────────────────────────────── */
  catImgEl.style.width = catImgEl.style.height = sz + 'px';
  catImgEl.style.objectFit      = s.image_fit || 'cover';
  catImgEl.style.objectPosition = s.image_object_position || 'center center';
  if (s.image_zoom && s.image_zoom !== 100) {
    catImgEl.style.transform = `scale(${s.image_zoom / 100})`;
  } else {
    catImgEl.style.transform = '';
  }
  catImgEl.style.border      = `${s.image_border_width != null ? s.image_border_width : 3}px solid ${s.image_border_color || 'rgba(255,255,255,0.5)'}`;
  catImgEl.style.boxShadow   = '0 8px 25px rgba(0,0,0,.35)';
  catImgEl.style.padding     = '0';
  catImgEl.style.background  = 'none';
  const sh = s.image_shape || 'circle';
  catImgEl.style.borderRadius = sh === 'circle' ? '50%' : sh === 'square' ? '0' : Math.round(sz * .12) + 'px';

  /* ── Logo appearance ─────────────────────────────────────────────────── */
  if (s.logo_size) logoImgEl.style.width = s.logo_size + 'px';
  logoImgEl.style.height       = 'auto';
  logoImgEl.style.opacity      = s.logo_opacity != null ? s.logo_opacity : 1;
  logoImgEl.style.borderRadius = (s.logo_border_radius || 0) + 'px';
  logoImgEl.style.filter       = s.logo_shadow ? 'drop-shadow(0 4px 12px rgba(0,0,0,0.4))' : 'none';

  /* ── Logo position ───────────────────────────────────────────────────── */
  const GAP = 20;
  logoWrapEl.style.top = logoWrapEl.style.bottom = logoWrapEl.style.left = logoWrapEl.style.right = 'auto';
  logoWrapEl.style.transform = 'none';
  const lvp = s.logo_vertical_position   || 'top';
  const lhp = s.logo_horizontal_position || 'right';
  const lvc = (lvp === 'middle');
  if      (lvp === 'top')    { logoWrapEl.style.top    = GAP + 'px'; }
  else if (lvp === 'bottom') { logoWrapEl.style.bottom = GAP + 'px'; }
  else if (lvp === 'middle') { logoWrapEl.style.top = '50%'; logoWrapEl.style.transform = 'translateY(-50%)'; }
  else if (lvp === 'custom') {
    if (s.logo_custom_top    != null) logoWrapEl.style.top    = s.logo_custom_top    + 'px';
    if (s.logo_custom_bottom != null) logoWrapEl.style.bottom = s.logo_custom_bottom + 'px';
  }
  if      (lhp === 'right')  { logoWrapEl.style.right = GAP + 'px'; }
  else if (lhp === 'left')   { logoWrapEl.style.left  = GAP + 'px'; }
  else if (lhp === 'center') { logoWrapEl.style.left = '50%'; logoWrapEl.style.transform = lvc ? 'translate(-50%,-50%)' : 'translateX(-50%)'; }
  else if (lhp === 'custom') {
    if (s.logo_custom_left  != null) logoWrapEl.style.left  = s.logo_custom_left  + 'px';
    if (s.logo_custom_right != null) logoWrapEl.style.right = s.logo_custom_right + 'px';
    if (!lvc) logoWrapEl.style.transform = 'none';
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   ASSETS
════════════════════════════════════════════════════════════════════════════ */
function applyAssets(s) {
  /* Category image */
  if (s.show_category_image && s.category_image) {
    catImgEl.src = '/static/' + s.category_image;
    imgWrapEl.classList.add('vis');
  } else {
    imgWrapEl.classList.remove('vis');
  }

  /* Company logo */
  if (s.show_company_logo && s.company_logo) {
    logoImgEl.src = '/static/' + s.company_logo;
    logoWrapEl.classList.add('vis');
  } else {
    logoWrapEl.classList.remove('vis');
  }

  /* Ticker — lives inside overlay bottom strip; offset right of clock when clock is on */
  if (s.show_ticker && s.ticker_text) {
    tickerTxtEl.textContent = s.ticker_text;
    tickerWrapEl.classList.add('vis');
    syncTickerOffset(s);
    startTicker(s);
  } else {
    tickerWrapEl.classList.remove('vis');
    stopTicker();
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   DECORATIONS
════════════════════════════════════════════════════════════════════════════ */
function applyDecorations(s) {
  cornerEls.forEach(c => {
    c.style.display     = s.show_decorative_elements ? 'block' : 'none';
    c.style.borderColor = s.accent_color || '#FFD700';
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   TEXT CONTENT + ONE-SHOT ANIMATIONS
════════════════════════════════════════════════════════════════════════════ */
function killTw(k) { if (twTimers[k]) { clearInterval(twTimers[k]); twTimers[k] = null; } }

function applyText(s) {
  ['main', 'sec', 'co'].forEach(killTw);
  if (txtAnimTO)   { clearTimeout(txtAnimTO);    txtAnimTO  = null; }
  if (txtRepeatTO) { clearInterval(txtRepeatTO); txtRepeatTO = null; }

  const spd = s.text_animation_speed || 1.0;
  applyTextEl(mainEl, s.main_text      || '', resolveAnim(s.main_text_animation,      s.text_animation), spd, 'main');
  applyTextEl(secEl,  s.secondary_text || '', resolveAnim(s.secondary_text_animation, s.text_animation), spd, 'sec');
  applyTextEl(coEl,   s.company_name   || '', resolveAnim(s.company_name_animation,   s.text_animation), spd, 'co');

  /* After entrance animations complete, activate continuous text classes */
  const wait = calcEntranceWait(s) * 1000 + 150;
  txtAnimTO = setTimeout(() => {
    runContinuous(s);
    const rep = s.text_animation_repeat_interval || 0;
    if (rep > 0) {
      txtRepeatTO = setInterval(() => {
        applyText(s);
        setTimeout(() => runContinuous(s), 200);
      }, rep * 1000);
    }
  }, wait);
}

function calcEntranceWait(s) {
  let m = 0, d = s.entrance_duration || 1;
  if (s.entrance_animation && s.entrance_animation !== 'none') m = Math.max(m, d + (s.entrance_delay            || 0));
  if (s.logo_animation      && s.logo_animation    !== 'none') m = Math.max(m, d + (s.logo_animation_delay      || 0));
  if (s.image_animation     && s.image_animation   !== 'none') m = Math.max(m, d + (s.image_animation_delay     || 0));
  if (s.ticker_entrance     && s.ticker_entrance   !== 'none') m = Math.max(m, d + (s.ticker_entrance_delay     || 0));
  return m;
}

function runContinuous(s) {
  const durS = (s.text_animation_speed || 2) + 's';
  [
    [mainEl, 'main_text_animation'],
    [secEl,  'secondary_text_animation'],
    [coEl,   'company_name_animation'],
  ].forEach(([el, key]) => {
    const a = (resolveAnim(s[key], s.text_animation) === 'auto')
      ? pickRandom(AUTO_CONTINUOUS)
      : resolveAnim(s[key], s.text_animation);
    stripClass(el, 'text-');
    if (!el.textContent.trim()) return;
    if (CONTINUOUS_SET.has(a)) {
      el.classList.add('text-' + a);
      el.style.animationDuration = durS;
    } else if (a === 'wave') {
      applyWave(el, el.textContent, parseFloat(s.text_animation_speed) || 2);
    }
  });
}

/* Pool of all one-shot animations used when 'auto' is selected */
const AUTO_ONESHOT = [
  'typewriter','fade-in-words','slide-in-words','letter-cascade',
  'scramble','fade-in-letters','roll-up','split-reveal','wave'
];
const AUTO_CONTINUOUS = Array.from(CONTINUOUS_SET);

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function applyTextEl(el, text, anim, spd, key) {
  stripClass(el, 'text-');
  el.className = el.className.split(' ').filter(c => c !== 'wave-letter').join(' ');
  el.style.animation = el.style.overflow = '';
  const resolved = (anim === 'auto') ? pickRandom(AUTO_ONESHOT) : anim;
  switch (resolved) {
    case 'typewriter':      applyTypewriter(el, text, key, spd); break;
    case 'fade-in-words':   applyFadeWords(el, text, spd);       break;
    case 'slide-in-words':  applySlideWords(el, text, spd);      break;
    case 'letter-cascade':  applyLetterCascade(el, text, spd);   break;
    case 'scramble':        applyScramble(el, text, spd);        break;
    case 'fade-in-letters': applyFadeLetters(el, text, spd);     break;
    case 'roll-up':         applyRollUp(el, text, spd);          break;
    case 'split-reveal':    applySplitReveal(el, text, spd);     break;
    case 'wave':            applyWave(el, text, spd);            break;
    default:                el.textContent = text;
  }
}

/* ── One-shot text animation helpers ─────────────────────────────────────── */
function applyTypewriter(el, text, key, spd) {
  if (!text) { el.innerHTML = ''; return; }
  el.innerHTML = '<span class="tw-cursor"></span>';
  let i = 0;
  twTimers[key] = setInterval(() => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i++]), el.querySelector('.tw-cursor'));
    } else {
      killTw(key);
      setTimeout(() => { const c = el.querySelector('.tw-cursor'); if (c) c.remove(); }, 1000);
    }
  }, 100 / spd);
}
function applyFadeWords(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  text.split(' ').forEach((w, i) => {
    const sp = document.createElement('span');
    sp.textContent = w;
    sp.style.cssText = 'opacity:0;display:inline-block;margin-right:.3em;transition:opacity .5s ease-in';
    el.appendChild(sp);
    setTimeout(() => sp.style.opacity = '1', i * (200 / spd));
  });
}
function applySlideWords(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  text.split(' ').forEach((w, i) => {
    const sp = document.createElement('span');
    sp.textContent = w;
    sp.style.cssText = 'opacity:0;transform:translateX(-20px);display:inline-block;margin-right:.3em;transition:all .5s ease-out';
    el.appendChild(sp);
    setTimeout(() => { sp.style.opacity = '1'; sp.style.transform = 'translateX(0)'; }, i * (200 / spd));
  });
}
function applyLetterCascade(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  const d = 60 / spd;
  text.split('').forEach((ch, i) => {
    const sp = document.createElement('span');
    sp.textContent = ch === ' ' ? '\u00A0' : ch;
    sp.style.cssText = `display:inline-block;opacity:0;transform:translateY(-24px);transition:opacity .3s ease,transform .35s cubic-bezier(.34,1.56,.64,1);transition-delay:${i * d}ms`;
    el.appendChild(sp);
    setTimeout(() => { sp.style.opacity = '1'; sp.style.transform = 'translateY(0)'; }, 50 + i * d);
  });
}
function applyScramble(el, text, spd) {
  if (!text) { el.textContent = ''; return; }
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*?!';
  const rd = Math.max(30, 70 / spd), sd = Math.max(20, 40 / spd);
  let rev = 0;
  const rand = () => chars[Math.floor(Math.random() * chars.length)];
  const sh = setInterval(() => {
    let o = '';
    for (let i = 0; i < text.length; i++) o += text[i] === ' ' ? ' ' : (i < rev ? text[i] : rand());
    el.textContent = o;
  }, sd);
  const rv = setInterval(() => { rev++; if (rev >= text.length) { clearInterval(rv); clearInterval(sh); el.textContent = text; } }, rd);
}
function applyFadeLetters(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  text.split('').forEach((ch, i) => {
    const sp = document.createElement('span');
    sp.textContent = ch === ' ' ? '\u00A0' : ch;
    sp.style.cssText = 'display:inline-block;opacity:0;transition:opacity .4s ease';
    el.appendChild(sp);
    setTimeout(() => sp.style.opacity = '1', i * (50 / spd));
  });
}
function applyRollUp(el, text, spd) {
  if (!text) { el.textContent = ''; return; }
  const dur = Math.round(800 / spd);
  el.style.overflow = 'hidden';
  const inner = document.createElement('div');
  inner.textContent = text;
  inner.style.cssText = `transform:translateY(100%);transition:transform ${dur}ms cubic-bezier(.22,1,.36,1)`;
  el.innerHTML = ''; el.appendChild(inner);
  setTimeout(() => inner.style.transform = 'translateY(0)', 30);
}
function applySplitReveal(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  const mid = Math.floor(text.length / 2), d = 40 / spd;
  text.split('').forEach((ch, i) => {
    const sp = document.createElement('span');
    sp.textContent = ch === ' ' ? '\u00A0' : ch;
    const dist = Math.abs(i - mid), dir = i < mid ? '40px' : '-40px';
    sp.style.cssText = `display:inline-block;opacity:0;transform:translateX(${dir});transition:opacity .4s ease,transform .45s cubic-bezier(.34,1.56,.64,1)`;
    el.appendChild(sp);
    setTimeout(() => { sp.style.opacity = '1'; sp.style.transform = 'translateX(0)'; }, 60 + dist * d);
  });
}
function applyWave(el, text, spd) {
  if (!text) { el.innerHTML = ''; return; } el.innerHTML = '';
  const dur = Math.max(.5, 1.5 / spd) + 's';
  text.split('').forEach((ch, i) => {
    const sp = document.createElement('span');
    sp.textContent = ch === ' ' ? '\u00A0' : ch;
    sp.className = 'wave-letter';
    sp.style.animationDuration = dur;
    sp.style.animationDelay    = (i * .07) + 's';
    el.appendChild(sp);
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   ENTRANCE + CONTINUOUS DISPLAY ANIMATIONS
════════════════════════════════════════════════════════════════════════════ */
function applyAnimations(s) {
  const dur = (s.entrance_duration || 1) + 's';

  function entrance(el, anim, delay) {
    if (!anim || anim === 'none') return;
    stripClass(el, 'anim-');
    el.classList.add('anim-' + anim);
    el.style.animationDuration = dur;
    el.style.animationDelay   = (delay || 0) + 's';
  }

  entrance(ovEl,       s.entrance_animation, s.entrance_delay           || 0);
  if (s.show_company_logo   && s.company_logo)   entrance(logoImgEl, s.logo_animation,   s.logo_animation_delay   || 0);
  if (s.show_category_image && s.category_image) entrance(catImgEl,  s.image_animation,  s.image_animation_delay  || 0);
  if (s.show_ticker         && s.ticker_text)    entrance(tickerWrapEl, s.ticker_entrance, s.ticker_entrance_delay || 0);

  /* Continuous display animations for logo and image */
  function displayAnim(el, enabled, anim, animDur) {
    stripClass(el, 'display-');
    if (enabled && anim && anim !== 'none') {
      el.classList.add('display-' + anim);
      if (animDur) el.style.animationDuration = animDur + 's';
    }
  }
  displayAnim(logoImgEl, s.logo_display_animation_enabled,  s.logo_display_animation,  s.logo_display_animation_duration);
  displayAnim(catImgEl,  s.image_display_animation_enabled, s.image_display_animation, s.image_display_animation_duration);
}

/* ════════════════════════════════════════════════════════════════════════════
   SECONDARY TEXT ROTATION
════════════════════════════════════════════════════════════════════════════ */
function startRotation(s) {
  stopRotation();
  if (!phrases.length) return;
  const dur  = (s.secondary_display_duration    || 3)   * 1000;
  const type = s.secondary_transition_type      || 'fade';
  const tDur = (s.secondary_transition_duration || 0.5) * 1000;
  const anim = resolveAnim(s.secondary_text_animation, s.text_animation);
  const spd  = s.text_animation_speed || 1.0;

  function showNextPhrase(next) {
    secEl.style.transition = '';
    secEl.style.transform  = '';
    secEl.style.opacity    = '';
    killTw('sec');
    applyTextEl(secEl, next, anim, spd, 'sec');
    const contDelay = calcEntranceWait(s) * 1000 + 150;
    setTimeout(() => {
      stripClass(secEl, 'text-');
      if (CONTINUOUS_SET.has(anim)) {
        secEl.classList.add('text-' + anim);
        secEl.style.animationDuration = (spd || 2) + 's';
      }
    }, contDelay);
  }

  rotTimer = setInterval(() => {
    phraseIdx = (phraseIdx + 1) % phrases.length;
    const next = phrases[phraseIdx];

    if (type === 'fade') {
      secEl.style.transition = `opacity ${tDur}ms`;
      secEl.style.opacity    = '0';
      rotPendingTimer = setTimeout(() => { rotPendingTimer = null; showNextPhrase(next); }, tDur);
    } else if (type === 'slide') {
      secEl.style.transition = `transform ${tDur}ms, opacity ${tDur}ms`;
      secEl.style.transform  = 'translateX(-50px)';
      secEl.style.opacity    = '0';
      rotPendingTimer = setTimeout(() => { rotPendingTimer = null; showNextPhrase(next); }, tDur);
    } else {
      showNextPhrase(next);
    }
  }, dur);
}
function stopRotation() {
  if (rotTimer)        { clearInterval(rotTimer);        rotTimer        = null; }
  if (rotPendingTimer) { clearTimeout(rotPendingTimer);  rotPendingTimer = null; }
  /* Reset any in-progress transition on secEl so it doesn't linger */
  secEl.style.transition = '';
  secEl.style.transform  = '';
}

/* ════════════════════════════════════════════════════════════════════════════
   TICKER
════════════════════════════════════════════════════════════════════════════ */
/* ─── syncTickerOffset ────────────────────────────────────────────────────
   Shifts the ticker-wrap left edge to sit flush with the right edge of
   the clock tab when the clock is on, or back to 0 when the clock is off.
   Called whenever either component changes state.
──────────────────────────────────────────────────────────────────────────── */
/* ─── syncStripHeight ─────────────────────────────────────────────────────
   Forces clock tab and ticker to the SAME pixel height so their shared
   slant is a perfect diagonal and the seam is invisible.
──────────────────────────────────────────────────────────────────────────── */
function syncStripHeight(s) {
  const clockFs  = parseFloat(s.clock_font_size  || 13);
  const tickerFs = parseFloat(s.ticker_font_size || 13);
  const clockOn  = s.show_clock;
  const tickerOn = s.show_ticker && s.ticker_text;
  // Use whichever is visible to drive the height; if both visible use larger
  let fs = clockFs;
  if (tickerOn) fs = Math.max(clockFs, tickerFs);
  const h = Math.round(fs * 2.4); // generous multiplier so text breathes
  const hpx = h + 'px';
  clockEl.style.height      = hpx;
  tickerWrapEl.style.height = hpx;
  tickerWrapEl.querySelector('#ticker-inner').style.height = hpx;

  // Pad #txt bottom just enough to clear the strip + a small breathing gap.
  // The strip is position:absolute so we only need to push text up by strip height + gap.
  const pad = s.container_padding != null ? s.container_padding : 25;
  if (clockOn || tickerOn) {
    txtEl.style.paddingBottom = (h + 10) + 'px';
  } else {
    txtEl.style.paddingBottom = pad + 'px';
  }
}

function syncTickerOffset(s) {
  if (s) syncStripHeight(s);
  const clockOn  = s && s.show_clock && clockEl.classList.contains('vis');
  const clockPos = (s && s.clock_position) || 'bottom';

  // Mirror clock position class onto ticker so the right slash variant fires
  tickerWrapEl.classList.toggle('pos-bottom', clockPos === 'bottom');
  tickerWrapEl.classList.toggle('pos-top',    clockPos === 'top');

  if (clockOn) {
    tickerWrapEl.classList.add('clock-adjacent');
    requestAnimationFrame(() => {
      const cw = clockEl.offsetWidth;
      // Offset by (clockWidth - 28) so both slash edges share the same two points
      tickerWrapEl.style.left = Math.max(0, cw - 28) + 'px';
      if (s.show_ticker && s.ticker_text) startTicker(s);
    });
  } else {
    tickerWrapEl.classList.remove('clock-adjacent');
    tickerWrapEl.style.left = '0';
    if (s && s.show_ticker && s.ticker_text) startTicker(s);
  }
}

function startTicker(s) {
  stopTicker();
  requestAnimationFrame(() => {
    const cw = tickerWrapEl.offsetWidth, tw = tickerTxtEl.scrollWidth;
    if (tw <= 0 || cw <= 0) return;
    const pps   = (s.ticker_speed || 50) * 2;
    const total = tw + cw;
    const dur   = (total / pps) * 1000;
    let start = null, pos = cw;
    function frame(ts) {
      if (!start) start = ts;
      pos = cw - total * ((ts - start) / dur);
      tickerTxtEl.style.transform = `translateX(${pos}px)`;
      if (pos <= -tw) { start = ts; pos = cw; }
      tickerRAF = requestAnimationFrame(frame);
    }
    tickerRAF = requestAnimationFrame(frame);
  });
}
function stopTicker() { if (tickerRAF) { cancelAnimationFrame(tickerRAF); tickerRAF = null; } }

/* ════════════════════════════════════════════════════════════════════════════
   CYCLE ENGINE  (auto show / hide with entry + exit + optional stagger)
════════════════════════════════════════════════════════════════════════════ */
function stopCycle() {
  cycleOn = false;
  clearTimeout(cycleTimer); cycleTimer = null;
  ovEl.classList.remove('no-tr');
  ovEl.style.animation = ovEl.style.clipPath = ovEl.style.transformOrigin = '';
}

function startCycle(s) {
  stopCycle();
  if (!s.overlay_cycle_enabled || !s.is_visible) return;
  cycleOn = true;

  const TRANS = Math.max(50,  (s.cycle_transition_duration || 0.6) * 1000);
  const SHOW  = Math.max(100, (s.overlay_visible_duration  || 10)  * 1000);
  const HIDE  = Math.max(100, (s.overlay_hidden_duration   || 5)   * 1000);
  const eAnim = CYCLE_MAP[s.cycle_entry_animation] || CYCLE_MAP['fade'];
  const xAnim = CYCLE_MAP[s.cycle_exit_animation]  || CYCLE_MAP['fade'];
  const zIn   = s.cycle_entry_animation === 'zoom-corner';
  const zOut  = s.cycle_exit_animation  === 'zoom-corner';

  /* Disable CSS transition so every show/hide snap inside the cycle is instant */
  ovEl.classList.add('no-tr');

  const EL = { main: mainEl, secondary: secEl, company: coEl };

  function snapHide() {
    ovEl.classList.add('cycle-hidden');
    Object.values(EL).forEach(el => { el.style.opacity = '0'; el.style.animation = ''; });
    ovEl.style.visibility = 'hidden';
    ovEl.style.opacity    = '0';
    ovEl.style.animation  = ovEl.style.clipPath = '';
  }
  function snapShow() {
    ovEl.classList.remove('cycle-hidden');
  }
  function resetEls() {
    Object.values(EL).forEach(el => {
      el.style.opacity = el.style.transform = el.style.filter = el.style.animation = '';
    });
  }
  /* Reveal text elements after entry and restart rotation */
  function fadeInEls() {
    Object.values(EL).forEach(el => {
      if (!el.textContent.trim()) return;
      el.style.transition = 'opacity 300ms ease';
      el.style.opacity = '';
      setTimeout(() => { el.style.transition = ''; }, 350);
    });
    if (s.secondary_rotation_enabled && phrases.length > 0) startRotation(s);
  }

  function staggerOut(done) {
    const order = (s.stagger_order || 'main,secondary,company').split(',').map(k => k.trim());
    const delay = (s.stagger_delay || 0.3) * 1000;
    const def   = STAGGER_MAP[s.stagger_element_exit || 'fade'] || STAGGER_MAP['fade'];
    order.forEach((k, i) => {
      const el = EL[k]; if (!el || !el.textContent.trim()) return;
      setTimeout(() => el.style.animation = `${def.o} 500ms ease forwards`, i * delay);
    });
    cycleTimer = setTimeout(() => {
      if (!cycleOn) return;
      Object.values(EL).forEach(el => { el.style.animation = ''; el.style.opacity = '0'; });
      done();
    }, order.length * delay + 560);
  }

  function staggerIn(done) {
    const order = (s.stagger_order || 'main,secondary,company').split(',').map(k => k.trim()).reverse();
    const delay = (s.stagger_delay || 0.3) * 1000;
    const def   = STAGGER_MAP[s.stagger_element_entry || 'fade'] || STAGGER_MAP['fade'];
    Object.values(EL).forEach(el => { el.style.opacity = '0'; el.style.animation = ''; });
    order.forEach((k, i) => {
      const el = EL[k]; if (!el) return;
      setTimeout(() => el.style.animation = `${def.i} 500ms ease forwards`, i * delay);
    });
    cycleTimer = setTimeout(() => {
      if (cycleOn) {
        resetEls();
        if (s.secondary_rotation_enabled && phrases.length > 0) startRotation(s);
        done();
      }
    }, order.length * delay + 560);
  }

  function doEntry() {
    if (!cycleOn) return;
    ovEl.style.transformOrigin = zIn ? '0% 100%' : '';
    snapHide();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (!cycleOn) return;
      snapShow();
      const target = ovEl.dataset.targetOpacity || '0.9';
      ovEl.style.opacity    = target;
      ovEl.style.visibility = 'visible';
      ovEl.style.animation  = `${eAnim.i} ${TRANS}ms ease forwards`;
      cycleTimer = setTimeout(() => {
        if (!cycleOn) return;
        ovEl.style.animation = ovEl.style.clipPath = ovEl.style.transformOrigin = '';
        if (s.stagger_enabled) staggerIn(() => { cycleTimer = setTimeout(doExit, SHOW); });
        else                   { fadeInEls(); cycleTimer = setTimeout(doExit, SHOW); }
      }, TRANS);
    }));
  }

  function doExit() {
    if (!cycleOn) return;
    /* Stop rotation immediately so it doesn't fire mid-stagger or mid-exit */
    stopRotation();
    ovEl.style.transformOrigin = zOut ? '0% 100%' : '';

    function runContainerExit() {
      if (!cycleOn) return;
      ovEl.style.animation = `${xAnim.o} ${TRANS}ms ease forwards`;
      cycleTimer = setTimeout(() => {
        if (!cycleOn) return;
        snapHide();
        ovEl.style.transformOrigin = '';
        cycleTimer = setTimeout(doEntry, HIDE);
      }, TRANS);
    }

    if (s.stagger_enabled) {
      /* Stagger elements out first, then run the configured container exit animation */
      staggerOut(runContainerExit);
    } else {
      runContainerExit();
    }
  }

  doEntry();
}

/* ════════════════════════════════════════════════════════════════════════════
   CLOCK
════════════════════════════════════════════════════════════════════════════ */
function startClock(s) {
  if (clockRAF) cancelAnimationFrame(clockRAF);

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function tick() {
    // Always Kenyan time — East Africa Time (UTC+3)
    const eat = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Nairobi' }));

    const day  = DAYS[eat.getDay()];
    const date = eat.getDate() + ' ' + MONTHS[eat.getMonth()] + ' ' + eat.getFullYear();

    const h24 = eat.getHours();
    const m   = String(eat.getMinutes()).padStart(2, '0');
    const sec = String(eat.getSeconds()).padStart(2, '0');

    // clock_show_time: when false, hide the time entirely — show day • date only
    if (s.clock_show_time === false) {
      clockEl.textContent = day + '  \u2022  ' + date;
    } else {
      let time;
      if (s.clock_format === '12h') {
        const h12  = h24 % 12 || 12;
        const ampm = h24 < 12 ? 'AM' : 'PM';
        time = `${String(h12).padStart(2,'0')}:${m}:${sec} ${ampm}`;
      } else {
        time = `${String(h24).padStart(2,'0')}:${m}:${sec}`;
      }
      clockEl.textContent = day + '  \u2022  ' + date + '  \u2022  ' + time;
    }
    clockRAF = requestAnimationFrame(tick);
  }
  tick();
}

function applyClock(s) {
  if (!s.show_clock) {
    clockEl.classList.remove('vis');
    if (clockRAF) { cancelAnimationFrame(clockRAF); clockRAF = null; }
    return;
  }
  clockEl.classList.add('vis');

  const gf = s.font_family || 'Segoe UI,sans-serif';
  clockEl.style.fontSize   = (s.clock_font_size || 13) + 'px';
  clockEl.style.fontFamily = s.clock_font_family || gf;
  clockEl.style.color      = s.clock_color || '#FFFFFF';

  // Background — match overlay bg so tab looks like it grows from the container
  const bgOp = parseFloat(s.clock_bg_opacity);
  if (s.clock_bg_color && s.clock_bg_color !== 'transparent' && !isNaN(bgOp) && bgOp > 0) {
    clockEl.style.backgroundColor = toRgba(s.clock_bg_color, bgOp);
  } else {
    const ovOp = parseFloat(s.overlay_bg_opacity) || 0.9;
    clockEl.style.backgroundColor = toRgba(s.overlay_bg_color || '#000000', ovOp);
  }

  // Border-radius — the left edge is flush with the container wall.
  // Match the overlay's corner radius on the two left corners so they blend.
  const r = parseInt(s.border_radius) || 0;
  const pos = s.clock_position || 'bottom';
  clockEl.classList.toggle('pos-bottom', pos === 'bottom');
  clockEl.classList.toggle('pos-top',    pos === 'top');

  // Push text right enough to clear the border-radius curve.
  // When radius is large the curve eats deeply into the strip horizontally.
  // Use r * 0.6 as a reliable inset (covers even very large radii), min 20px.
  const leftPad = Math.max(20, Math.ceil(r * 0.6) + 8);
  clockEl.style.paddingLeft = leftPad + 'px';

  if (pos === 'bottom') {
    clockEl.style.borderRadius = `0 0 0 ${r}px`;
  } else {
    clockEl.style.borderRadius = `${r}px 0 0 0`;
  }

  // Continuous animation
  stripClass(clockEl, 'text-');
  if (s.clock_animation && s.clock_animation !== 'none') {
    clockEl.classList.add('text-' + s.clock_animation);
  }

  syncStripHeight(s);
  startClock(s);
  // Keep ticker offset in sync whenever clock is applied
  syncTickerOffset(s);
}

/* ════════════════════════════════════════════════════════════════════════════
   LIVE INDICATOR
════════════════════════════════════════════════════════════════════════════ */
function applyLiveIndicator(s) {
  if (!s.show_live_indicator) {
    liveIndEl.classList.remove('vis');
    return;
  }
  liveIndEl.classList.add('vis');

  // ── Text content ──────────────────────────────────────────────────────────
  const label = s.live_label || 'LIVE';
  const loc   = s.live_location || '';
  liveLabelEl.textContent = label;
  liveLocEl.textContent   = loc;
  liveSepEl.style.display = loc ? 'inline' : 'none';

  // ── Typography ────────────────────────────────────────────────────────────
  const gf = s.live_indicator_font_family || s.font_family || 'Segoe UI,sans-serif';
  const fs = (s.live_indicator_font_size || 16) + 'px';
  liveIndEl.style.fontSize   = fs;
  liveIndEl.style.fontFamily = gf;
  liveLabelEl.style.fontFamily = gf;
  liveLocEl.style.fontFamily   = gf;

  // ── Outer badge background (wraps both parts) ─────────────────────────────
  const outerOp = s.live_indicator_bg_opacity != null ? s.live_indicator_bg_opacity : 0.9;
  liveIndEl.style.backgroundColor = toRgba(s.live_indicator_bg_color || '#CC0000', outerOp);

  // ── Live Label — independent text + background colour ────────────────────
  const labelBgOp = s.live_label_bg_opacity != null ? s.live_label_bg_opacity : 0.9;
  liveLabelEl.style.color = s.live_label_color || '#FFFFFF';
  if (labelBgOp > 0 && s.live_label_bg_color) {
    liveLabelEl.style.backgroundColor = toRgba(s.live_label_bg_color, labelBgOp);
    liveLabelEl.style.padding         = '3px 8px';
    liveLabelEl.style.borderRadius    = '4px';
  } else {
    liveLabelEl.style.backgroundColor = 'transparent';
    liveLabelEl.style.padding         = '0';
  }

  // ── Location Text — independent text + background colour ─────────────────
  const locBgOp = s.live_location_bg_opacity != null ? s.live_location_bg_opacity : 0.0;
  liveLocEl.style.color = s.live_location_color || '#FFFFFF';
  if (locBgOp > 0 && s.live_location_bg_color) {
    liveLocEl.style.backgroundColor = toRgba(s.live_location_bg_color, locBgOp);
    liveLocEl.style.padding         = '3px 8px';
    liveLocEl.style.borderRadius    = '4px';
  } else {
    liveLocEl.style.backgroundColor = 'transparent';
    liveLocEl.style.padding         = '0';
  }

  // ── Pulsing dot + separator use accent colour for branded look ────────────
  const accentCol = s.accent_color || '#FFD700';
  liveDotEl.style.color      = accentCol;
  liveDotEl.style.background = accentCol;
  liveSepEl.style.color      = accentCol;

  // ── Badge animation (applied to the whole badge element) ─────────────────
  stripClass(liveIndEl, 'text-');
  if (s.live_indicator_animation && s.live_indicator_animation !== 'none') {
    liveIndEl.classList.add('text-' + s.live_indicator_animation);
  }

  // ── Position ──────────────────────────────────────────────────────────────
  const vp  = s.live_indicator_vertical_position   || 'top';
  const hp  = s.live_indicator_horizontal_position || 'left';
  const GAP = '20px';
  liveIndEl.style.top = liveIndEl.style.bottom = 'auto';
  liveIndEl.style.left = liveIndEl.style.right = 'auto';
  liveIndEl.style.transform = 'none';

  if      (vp === 'top')    liveIndEl.style.top    = GAP;
  else if (vp === 'bottom') liveIndEl.style.bottom = GAP;
  else if (vp === 'middle') { liveIndEl.style.top = '50%'; liveIndEl.style.transform = 'translateY(-50%)'; }

  if      (hp === 'left')   liveIndEl.style.left  = GAP;
  else if (hp === 'right')  liveIndEl.style.right = GAP;
  else if (hp === 'center') { liveIndEl.style.left = '50%'; liveIndEl.style.transform += ' translateX(-50%)'; }
}

/* ════════════════════════════════════════════════════════════════════════════
   POLLING
════════════════════════════════════════════════════════════════════════════ */
async function poll() {
  try {
    const res  = await fetch(`/api/poll/${CAT}`);
    const data = await res.json();
    if (data.settings) {
      const ns = data.settings;
      if (JSON.stringify(ns) !== JSON.stringify(cur)) {
        cur = ns;
        applySettings(ns);
      }
    }
  } catch (e) { console.warn('Poll error:', e); }
}

setInterval(poll, 300);
poll();
</script>
