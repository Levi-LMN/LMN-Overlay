<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lower Third — Broadcast</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #111;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
}

/* Simulated broadcast background */
.bg {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%),
    url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600&q=80') center/cover no-repeat;
  z-index: 0;
}

/* ─────────────────────────────────────────
   LOWER THIRD ROOT
   Sits bottom-left, does NOT span full width
───────────────────────────────────────── */
.lt {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-bottom: 56px; /* leave room for ticker */
  padding-left: 0;
  pointer-events: none;
}

/* ─────────────────────────────────────────
   BLOCK A — RED CATEGORY CHIP
   Small, punchy, sits above everything
───────────────────────────────────────── */
.chip {
  display: flex;
  align-items: center;
  height: 28px;
  overflow: hidden;
  margin-bottom: 0;
  /* clip-in animation uses a width wipe */
  width: 0;
  opacity: 1;
}
.chip.open  { animation: chipOpen  0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.chip.close { animation: chipClose 0.3s cubic-bezier(0.4,0,1,1) forwards; }

@keyframes chipOpen  { to { width: var(--chip-w, 180px); } }
@keyframes chipClose { to { width: 0; } }

.chip-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #C8001E;
  height: 100%;
  padding: 0 14px 0 16px;
  white-space: nowrap;
  position: relative;
  /* right-side diagonal cut */
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 100%, 0 100%);
  padding-right: 22px;
}

.chip-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #fff;
  flex-shrink: 0;
  animation: dotpulse 1.1s ease-in-out infinite;
}
@keyframes dotpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }

.chip-label {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 11.5px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #fff;
  white-space: nowrap;
}

/* ─────────────────────────────────────────
   BLOCK B — HEADLINE SLAB
   Solid dark-navy, left-edge red bar,
   wipes in from left
───────────────────────────────────────── */
.headline-block {
  display: flex;
  align-items: stretch;
  height: 52px;
  margin-top: 3px;
  clip-path: inset(0 100% 0 0); /* wipe reveal */
}
.headline-block.open  { animation: wipeOpen  0.5s cubic-bezier(0.4,0,0.2,1) 0.15s forwards; }
.headline-block.close { animation: wipeClose 0.35s cubic-bezier(0.4,0,1,1) forwards; }

@keyframes wipeOpen  { to { clip-path: inset(0 0% 0 0); } }
@keyframes wipeClose { to { clip-path: inset(0 100% 0 0); } }

.headline-bar {
  width: 4px;
  background: #C8001E;
  flex-shrink: 0;
}

.headline-text {
  background: rgba(6,8,20,0.93);
  backdrop-filter: blur(4px);
  padding: 0 26px 0 14px;
  display: flex;
  align-items: center;
  white-space: nowrap;
}

.headline-text span {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 27px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #fff;
  /* individual word animations applied via JS */
  display: inline-flex;
  gap: 12px;
}

.headline-text span .hw {
  display: inline-block;
  opacity: 0;
  transform: translateY(12px);
}
.headline-text span .hw.in {
  animation: hwIn 0.4s ease forwards;
}
.headline-text span .hw.out {
  animation: hwOut 0.25s ease forwards;
}
@keyframes hwIn  { to { opacity:1; transform:translateY(0); } }
@keyframes hwOut { to { opacity:0; transform:translateY(-10px); } }

/* ─────────────────────────────────────────
   BLOCK C — SUBLINE
   Slightly lighter navy, sits flush below,
   slightly wider than headline
   Wipes in with small delay
───────────────────────────────────────── */
.sub-block {
  display: flex;
  align-items: stretch;
  height: 30px;
  clip-path: inset(0 100% 0 0);
}
.sub-block.open  { animation: wipeOpen  0.5s cubic-bezier(0.4,0,0.2,1) 0.28s forwards; }
.sub-block.close { animation: wipeClose 0.35s cubic-bezier(0.4,0,1,1) 0.05s forwards; }

.sub-bar {
  width: 4px;
  background: rgba(200,0,30,0.35);
  flex-shrink: 0;
}

.sub-text {
  background: rgba(14,18,38,0.78);
  backdrop-filter: blur(6px);
  padding: 0 22px 0 14px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  gap: 6px;
}

.sub-text span {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.78);
  display: inline-flex;
  gap: 7px;
}

.sub-text span .sw {
  display: inline-block;
  opacity: 0;
  transform: translateX(-8px);
}
.sub-text span .sw.in  { animation: swIn  0.35s ease forwards; }
.sub-text span .sw.out { animation: swOut 0.2s ease forwards; }
@keyframes swIn  { to { opacity:1; transform:translateX(0); } }
@keyframes swOut { to { opacity:0; transform:translateX(8px); } }

/* ─────────────────────────────────────────
   TICKER — full width, bottom of screen
───────────────────────────────────────── */
.ticker {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 36px;
  display: flex;
  align-items: stretch;
  z-index: 20;
  transform: translateY(100%);
  pointer-events: none;
}
.ticker.open  { animation: tickUp   0.45s cubic-bezier(0.4,0,0.2,1) 0.45s forwards; }
.ticker.close { animation: tickDown 0.3s  cubic-bezier(0.4,0,1,1)   forwards; }
@keyframes tickUp   { to { transform: translateY(0); } }
@keyframes tickDown { to { transform: translateY(100%); } }

.ticker-slug {
  background: #C8001E;
  display: flex;
  align-items: center;
  padding: 0 20px 0 14px;
  flex-shrink: 0;
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
  padding-right: 28px;
}
.ticker-slug span {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #fff;
  white-space: nowrap;
}

.ticker-body {
  background: rgba(4,5,14,0.96);
  flex: 1;
  overflow: hidden;
  position: relative;
  border-top: 1px solid rgba(200,0,30,0.4);
}

.ticker-run {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.82);
  animation: tickroll 30s linear infinite;
}
.ticker-run .bull { color: #C8001E; margin: 0 18px; font-size: 10px; }

@keyframes tickroll {
  from { left: 100%; }
  to   { left: -200%; }
}

.ticker-time {
  background: rgba(4,5,14,0.96);
  border-top: 1px solid rgba(200,0,30,0.4);
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
}
.ticker-time span {
  font-family: 'Oswald', sans-serif;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.55);
}

/* ─────────────────────────────────────────
   CONTROLS (demo only)
───────────────────────────────────────── */
.controls {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 999;
  pointer-events: all;
}
.ctrl {
  font-family: 'Oswald', sans-serif;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 20px;
  border: none;
  cursor: pointer;
  transition: filter .2s, transform .15s;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
}
.ctrl:hover  { filter:brightness(1.3); transform:translateY(-1px); }
.ctrl.red    { background: #C8001E; border-color: #C8001E; }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl red" onclick="show()">Show</button>
  <button class="ctrl"     onclick="hide()">Hide</button>
  <button class="ctrl"     onclick="next()">Next Story</button>
</div>

<!-- Lower Third -->
<div class="lt" id="lt">
  <div class="chip"           id="chip">
    <div class="chip-inner">
      <div class="chip-dot"></div>
      <div class="chip-label" id="chipLabel">Breaking News</div>
    </div>
  </div>
  <div class="headline-block" id="hblock">
    <div class="headline-bar"></div>
    <div class="headline-text"><span id="htext"></span></div>
  </div>
  <div class="sub-block"      id="sblock">
    <div class="sub-bar"></div>
    <div class="sub-text"><span id="stext"></span></div>
  </div>
</div>

<!-- Ticker -->
<div class="ticker" id="ticker">
  <div class="ticker-slug"><span id="slugLabel">Monday Report</span></div>
  <div class="ticker-body">
    <div class="ticker-run" id="tickerRun"></div>
  </div>
  <div class="ticker-time"><span id="clockEl">10:11 PM</span></div>
</div>

<script>
const stories = [
  {
    chip: "Weather Alert",
    slug: "Monday Report",
    headline: "Navigating The Weather",
    sub: "Meteorological Dept Issues Heavy Rainfall Advisory",
    ticker: "Heavy rains expected across Nairobi County through Thursday  ·  Rivers may burst banks in low-lying areas  ·  Residents urged to avoid flooded roads  ·  Schools to remain open pending further notice"
  },
  {
    chip: "Justice",
    slug: "Monday Report",
    headline: "Trial Date Confirmed",
    sub: "Officer Who Killed Mask Vendor Faces Court in July",
    ticker: "DPP files charges at Milimani Law Courts  ·  Family of deceased demands full accountability  ·  Case expected to last three weeks  ·  Public gallery seats limited"
  },
  {
    chip: "Economy",
    slug: "Business",
    headline: "Shilling Recovers",
    sub: "Kenya Currency Hits Three-Month High Against Dollar",
    ticker: "KES trades at 128.40 per USD  ·  CBK tightens monetary stance  ·  NSE gains 2.1% on the session  ·  Analysts forecast continued stability"
  },
  {
    chip: "Sports",
    slug: "Sport",
    headline: "Stars Defeat Tanzania",
    sub: "Kenya Win 2-1 in AFCON Qualifying Clash",
    ticker: "Olunga scores brace in Nairobi  ·  Harambee Stars move second in Group C  ·  Next qualifier vs Uganda on March 22  ·  Coach praises squad depth"
  }
];

let idx = 0;
let on  = false;

/* util: build word spans */
function buildWords(el, text, cls, baseDelay = 0) {
  el.innerHTML = '';
  text.split(' ').forEach((w, i) => {
    const s = document.createElement('span');
    s.className = `${cls}`;
    s.textContent = w;
    s.style.animationDelay = `${baseDelay + i * 0.065}s`;
    el.appendChild(s);
  });
}

function animWords(el, cls, baseDelay = 0) {
  el.querySelectorAll('span').forEach((s, i) => {
    s.className = cls;
    s.style.animationDelay = `${baseDelay + i * 0.065}s`;
  });
}

function setClass(id, cls) {
  const el = document.getElementById(id);
  el.classList.remove('open','close');
  void el.offsetWidth;
  el.classList.add(cls);
  return el;
}

function setChipWidth() {
  // measure natural width for the wipe animation
  const chip = document.getElementById('chip');
  const inner = chip.querySelector('.chip-inner');
  chip.style.setProperty('--chip-w', inner.scrollWidth + 'px');
}

function loadStory(i, animate) {
  const s = stories[i];
  document.getElementById('chipLabel').textContent  = s.chip;
  document.getElementById('slugLabel').textContent  = s.slug;

  // ticker text
  const tparts = s.ticker.split('·').map(p => p.trim());
  document.getElementById('tickerRun').innerHTML =
    tparts.map(p => p).join(' <span class="bull">●</span> ') +
    ' <span class="bull">●</span> ' +
    tparts.map(p => p).join(' <span class="bull">●</span> ');

  // headline words
  const ht = document.getElementById('htext');
  buildWords(ht, s.headline, animate ? 'hw in' : 'hw', animate ? 0.45 : 0);

  // sub words
  const st = document.getElementById('stext');
  buildWords(st, s.sub, animate ? 'sw in' : 'sw', animate ? 0.58 : 0);
}

function show() {
  if (on) return;
  on = true;

  setChipWidth();
  loadStory(idx, true);

  setClass('chip',   'open');
  setClass('hblock', 'open');
  setClass('sblock', 'open');
  setClass('ticker', 'open');
}

async function hide() {
  if (!on) return;

  // words out
  animWords(document.getElementById('htext'), 'hw out', 0);
  animWords(document.getElementById('stext'), 'sw out', 0);

  await sleep(260);

  setClass('sblock', 'close');
  setClass('hblock', 'close');
  setClass('chip',   'close');
  setClass('ticker', 'close');

  await sleep(400);
  on = false;
}

async function next() {
  if (!on) { show(); return; }

  // animate current words out
  animWords(document.getElementById('htext'), 'hw out', 0);
  animWords(document.getElementById('stext'), 'sw out', 0.04);

  await sleep(300);

  idx = (idx + 1) % stories.length;
  loadStory(idx, true);

  // re-measure chip for potentially different label
  setChipWidth();
  setClass('chip', 'open');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Clock
function tick() {
  const d = new Date();
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = (h % 12) || 12;
  document.getElementById('clockEl').textContent = `${h}:${m} ${ap}`;
}
tick();
setInterval(tick, 1000);

// Auto show on load
setTimeout(show, 700);
</script>
</body>
</html>
